<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL - Super Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
    }
    header {
      background: #141414; border-bottom: 1px solid #2a2a2a;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 16px; display: flex; align-items: center; gap: 10px; }
    .logo { width: 30px; height: 30px; background: #6366f1; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
    .btn {
      background: #6366f1; color: white; border: none;
      padding: 8px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    .btn:hover { background: #5558d9; }
    .btn-secondary { background: #333; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .user-info { font-size: 13px; color: #888; }

    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat {
      background: #141414; border: 1px solid #2a2a2a;
      padding: 16px; border-radius: 10px;
    }
    .stat .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .value { font-size: 26px; font-weight: 700; margin-top: 4px; }

    .tenant-card {
      background: #141414; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 20px; margin-bottom: 16px;
    }
    .tenant-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 16px;
      border-bottom: 1px solid #2a2a2a;
    }
    .tenant-info h3 { font-size: 18px; margin-bottom: 4px; }
    .tenant-info .meta { font-size: 13px; color: #888; }
    .tenant-actions { display: flex; gap: 8px; }
    .badge {
      padding: 3px 10px; border-radius: 12px; font-size: 11px;
      font-weight: 600; text-transform: uppercase;
      display: inline-block; margin-left: 8px;
    }
    .badge.plan-custom { background: #3b2f1e; color: #fbbf24; }
    .badge.plan-starter { background: #1e3a5f; color: #60a5fa; }
    .badge.plan-pro { background: #1e3b2f; color: #34d399; }
    .badge.plan-agency { background: #2e1e3b; color: #a78bfa; }
    .badge.status-active { background: #1e3b2f; color: #34d399; }

    .features-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 10px;
    }
    .feature-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: #1a1a1a; border-radius: 8px;
      border: 1px solid #2a2a2a;
    }
    .feature-toggle label { font-size: 13px; cursor: pointer; flex: 1; }
    .feature-toggle input[type="checkbox"] {
      width: 36px; height: 20px; appearance: none; -webkit-appearance: none;
      background: #333; border-radius: 10px; position: relative;
      cursor: pointer; transition: background 0.2s;
    }
    .feature-toggle input[type="checkbox"]::before {
      content: ""; position: absolute; width: 16px; height: 16px;
      background: white; border-radius: 50%; top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .feature-toggle input[type="checkbox"]:checked { background: #34d399; }
    .feature-toggle input[type="checkbox"]:checked::before { left: 18px; }

    .feature-category {
      font-size: 11px; color: #6366f1; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
      margin-top: 16px; margin-bottom: 8px;
    }
    .feature-category:first-child { margin-top: 0; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #141414; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 24px; width: 560px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 16px; }
    .modal label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; margin-top: 10px; }
    .modal input, .modal select {
      width: 100%; padding: 8px 10px; background: #0f0f0f;
      color: #e0e0e0; border: 1px solid #333; border-radius: 6px;
      font-size: 13px;
    }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #34d399; color: #0f0f0f;
      padding: 12px 20px; border-radius: 8px;
      font-weight: 600; opacity: 0;
      transition: opacity 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #dc2626; color: white; }
  </style>
</head>
<body>
  <header>
    <h1><span class="logo">OR</span> OVA REAL - Super Admin</h1>
    <div>
      <span class="user-info" id="user-info"></span>
      <button class="btn btn-secondary btn-sm" onclick="logout()" style="margin-left:12px;">Salir</button>
    </div>
  </header>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-size: 22px;">Clientes (Tenants)</h2>
      <button class="btn" onclick="openNewTenantModal()">+ Nuevo cliente</button>
    </div>

    <div class="stats-grid" id="stats"></div>
    <div id="tenants-container">
      <div style="text-align:center; padding:60px; color:#666;">Cargando...</div>
    </div>
  </div>

  <!-- Modal crear tenant -->
  <div class="modal-overlay" id="new-tenant-modal">
    <div class="modal">
      <h2>Nuevo cliente</h2>
      <label>Nombre del negocio</label>
      <input id="nt-name" placeholder="Ej: María Real Estate" />
      <label>Slug (URL-safe, sin espacios)</label>
      <input id="nt-slug" placeholder="Ej: maria-re" />
      <label>Nombre del agente</label>
      <input id="nt-agent-name" placeholder="Ej: María González" />
      <label>Email del agente (será su login)</label>
      <input id="nt-agent-email" type="email" placeholder="maria@ejemplo.com" />
      <label>Contraseña inicial del cliente</label>
      <input id="nt-password" type="text" placeholder="Password que le mandas al cliente" />
      <label>Teléfono / WhatsApp</label>
      <input id="nt-agent-phone" placeholder="+1..." />
      <label>Idioma preferido</label>
      <select id="nt-lang"><option value="en">English</option><option value="es">Español</option></select>
      <label>Instagram User ID</label>
      <input id="nt-ig-id" placeholder="17841..." />
      <label>Instagram handle</label>
      <input id="nt-ig-handle" placeholder="maria_re" />
      <label>Instagram Access Token (IGAA...)</label>
      <input id="nt-ig-token" placeholder="IGAAM..." />
      <label>Google Sheet ID (opcional)</label>
      <input id="nt-sheet-id" placeholder="1Z-4G..." />
      <label>Plan</label>
      <select id="nt-plan">
        <option value="starter">Starter</option>
        <option value="pro">Pro</option>
        <option value="agency">Agency</option>
        <option value="custom">Custom</option>
      </select>
      <div style="display:flex; gap:8px; margin-top:20px; justify-content:flex-end;">
        <button class="btn btn-secondary" onclick="closeNewTenantModal()">Cancelar</button>
        <button class="btn" onclick="createTenant()">Crear cliente y usuario</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

    const SUPABASE_URL = "https://vrfydffwczomvuoigwsm.supabase.co"
    const SUPABASE_ANON_KEY = "REPLACE_WITH_ANON_KEY"
    const API = SUPABASE_URL + "/functions/v1/dashboard"

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    window.supabase = supabase

    const { data: { session } } = await supabase.auth.getSession()
    if (!session) window.location.href = "login.html"
    window.token = session.access_token

    let tenantsCache = []
    let statsCache = {}

    const FEATURE_CATEGORIES = {
      "Canales": ["instagram_bot", "sms_bot"],
      "Core IA": ["ai_responses", "ai_memory_extraction", "custom_bot_voice", "multi_language"],
      "Datos": ["google_sheets_properties", "dashboard_access"],
      "Automatizaciones": ["auto_followups", "drip_campaigns", "handoff_to_human"],
      "Notificaciones": ["admin_email_notifications"],
      "Premium": ["lead_scoring", "analytics", "white_label", "tour_calendar"],
    }
    const FEATURE_LABELS = {
      instagram_bot: "Bot Instagram DMs", ai_responses: "Respuestas con IA",
      google_sheets_properties: "Propiedades desde Sheets",
      ai_memory_extraction: "Memoria estructurada",
      auto_followups: "Follow-ups 24/48/72h",
      admin_email_notifications: "Email al admin",
      handoff_to_human: "Handoff a humano",
      multi_language: "Multi-idioma ES/EN",
      dashboard_access: "Acceso al CRM",
      sms_bot: "Bot SMS (Twilio)",
      drip_campaigns: "Drip campaigns",
      lead_scoring: "Lead scoring",
      analytics: "Analytics",
      white_label: "White-label",
      tour_calendar: "Calendario tours",
      custom_bot_voice: "Voz custom del bot",
    }

    const meRes = await api("?action=me")
    if (meRes.user?.role !== "super_admin") {
      window.location.href = "dashboard.html"
    }
    document.getElementById("user-info").textContent = meRes.user?.email || ""

    await loadTenants()

    window.logout = async function() {
      await supabase.auth.signOut()
      window.location.href = "login.html"
    }
    window.saveFeatures = saveFeatures
    window.openNewTenantModal = () => document.getElementById("new-tenant-modal").classList.add("show")
    window.closeNewTenantModal = () => document.getElementById("new-tenant-modal").classList.remove("show")
    window.createTenant = createTenant
    window.impersonate = impersonate

    async function api(path, init = {}) {
      const res = await fetch(API + path, {
        ...init,
        headers: { ...(init.headers || {}), Authorization: "Bearer " + window.token },
      })
      return res.json()
    }

    async function loadTenants() {
      const data = await api("?action=tenants")
      tenantsCache = data.tenants || []
      statsCache = data.stats || {}
      renderStats()
      renderTenants()
    }

    function renderStats() {
      const totalLeads = Object.values(statsCache).reduce((acc, s) => acc + (s.leads || 0), 0)
      const activeBots = tenantsCache.filter(t => t.bot_active && t.features?.instagram_bot).length
      document.getElementById("stats").innerHTML =
        '<div class="stat"><div class="label">Clientes</div><div class="value">' + tenantsCache.length + '</div></div>' +
        '<div class="stat"><div class="label">Bots activos</div><div class="value">' + activeBots + '</div></div>' +
        '<div class="stat"><div class="label">Leads totales</div><div class="value">' + totalLeads + '</div></div>'
    }

    function renderTenants() {
      const container = document.getElementById("tenants-container")
      if (tenantsCache.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:60px; color:#666;">Sin clientes aún.</div>'
        return
      }
      container.innerHTML = tenantsCache.map(renderTenantCard).join("")
    }

    function renderTenantCard(t) {
      const features = t.features || {}
      const stats = statsCache[t.id] || {}
      let featuresHTML = ""
      for (const cat of Object.keys(FEATURE_CATEGORIES)) {
        featuresHTML += '<div class="feature-category">' + cat + '</div><div class="features-grid">'
        for (const key of FEATURE_CATEGORIES[cat]) {
          const checked = features[key] ? "checked" : ""
          featuresHTML += '<div class="feature-toggle"><label for="' + t.slug + '-' + key + '">' + FEATURE_LABELS[key] + '</label>' +
            '<input type="checkbox" id="' + t.slug + '-' + key + '" data-slug="' + t.slug + '" data-feature="' + key + '" ' + checked + ' /></div>'
        }
        featuresHTML += '</div>'
      }
      return (
        '<div class="tenant-card">' +
          '<div class="tenant-header">' +
            '<div class="tenant-info">' +
              '<h3>' + esc(t.name) + ' <span class="badge plan-' + t.plan + '">' + t.plan + '</span>' +
              (t.status === "active" ? '<span class="badge status-active">Active</span>' : '') + '</h3>' +
              '<div class="meta">' +
                (t.instagram_handle ? '@' + esc(t.instagram_handle) + ' · ' : '') +
                esc(t.agent_email || '') + ' · Leads: ' + (stats.leads || 0) +
              '</div>' +
            '</div>' +
            '<div class="tenant-actions">' +
              '<button class="btn btn-secondary btn-sm" onclick="impersonate(\'' + t.slug + '\')">Ver su CRM</button>' +
              '<button class="btn btn-sm" onclick="saveFeatures(\'' + t.slug + '\')">Guardar features</button>' +
            '</div>' +
          '</div>' +
          featuresHTML +
        '</div>'
      )
    }

    async function saveFeatures(slug) {
      const inputs = document.querySelectorAll('[data-slug="' + slug + '"][data-feature]')
      const features = {}
      inputs.forEach(i => { features[i.dataset.feature] = i.checked })
      const r = await api("?action=update-features", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug, features }),
      })
      if (r.ok) { toast("Features guardadas"); loadTenants() }
      else toast(r.error || "Error", true)
    }

    function impersonate(slug) {
      // En una próxima iteración se puede hacer login-as-user real.
      // Por ahora abrir la vista del tenant pasando el slug por URL.
      window.open("dashboard.html?tenant=" + slug, "_blank")
    }

    async function createTenant() {
      const body = {
        name: v("nt-name"), slug: v("nt-slug"),
        agent_name: v("nt-agent-name"),
        agent_email: v("nt-agent-email"),
        agent_phone: v("nt-agent-phone"),
        agent_language: v("nt-lang"),
        instagram_user_id: v("nt-ig-id"),
        instagram_handle: v("nt-ig-handle"),
        instagram_access_token: v("nt-ig-token"),
        google_sheet_id: v("nt-sheet-id"),
        plan: v("nt-plan"),
      }
      const password = v("nt-password")
      if (!body.name || !body.slug || !body.agent_name || !body.agent_email) {
        return toast("Nombre, slug, agente y email son obligatorios", true)
      }
      if (!password || password.length < 6) {
        return toast("Password mínimo 6 caracteres", true)
      }
      // 1. Crear tenant
      const r = await api("?action=create-tenant", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })
      if (!r.ok) return toast(r.error || "Error creando tenant", true)

      // 2. Crear usuario con email + password asociado al tenant
      const u = await api("?action=create-user", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: body.agent_email, password,
          tenant_id: r.tenant.id, role: "tenant_admin",
          name: body.agent_name,
        }),
      })
      if (!u.ok) return toast("Tenant creado pero falló usuario: " + (u.error || ""), true)

      toast("Cliente y usuario creados")
      closeNewTenantModal()
      loadTenants()
    }

    function v(id) { return (document.getElementById(id)?.value || "").trim() }

    function toast(msg, isError) {
      const el = document.getElementById("toast")
      el.textContent = msg
      el.className = "toast show" + (isError ? " error" : "")
      setTimeout(() => el.className = "toast", 2500)
    }

    function esc(s) {
      if (s === null || s === undefined) return ""
      const d = document.createElement("div"); d.textContent = String(s); return d.innerHTML
    }
  </script>
</body>
</html>
