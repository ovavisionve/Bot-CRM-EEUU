<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f0f2f5; color: #1c1e21; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .container { max-width: 640px; text-align: center; }
    .logo-big {
      width: 84px; height: 84px; background: #1877f2;
      border-radius: 20px; display: inline-flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: 34px; color: white;
      margin-bottom: 24px; box-shadow: 0 8px 24px rgba(24, 119, 242, 0.3);
    }
    h1 { font-size: 42px; margin-bottom: 12px; color: #1c1e21; }
    p { color: #65676b; font-size: 17px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #1877f2; color: white;
      padding: 14px 32px; border-radius: 10px;
      text-decoration: none; font-weight: 600; margin: 6px;
      transition: background 0.15s; font-size: 15px;
    }
    .btn:hover { background: #166fe5; }
    .btn.secondary {
      background: #ffffff; border: 1px solid #dddfe2; color: #1c1e21;
    }
    .btn.secondary:hover { background: #f5f6f7; }
    .footer { margin-top: 60px; font-size: 13px; color: #8a8d91; }
    .footer a { color: #1877f2; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-big">OR</div>
    <h1>OVA REAL</h1>
    <p>CRM + Automatización IA para agentes inmobiliarios.<br>
    Ingresa a tu portal con tu email y contraseña.</p>
    <a href="login.html" class="btn">Iniciar sesión</a>
    <a href="privacy.html" class="btn secondary">Privacidad</a>
    <div class="footer">
      <p>OVA VISION Agency &middot; <a href="https://ovavisionagency.com">ovavisionagency.com</a></p>
    </div>
  </div>
</body>
</html>
