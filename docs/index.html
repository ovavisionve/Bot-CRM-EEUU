<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
      color: #e0e0e0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      margin: 0; padding: 40px 20px;
    }
    .container { max-width: 640px; text-align: center; }
    .logo-big {
      width: 80px; height: 80px; background: #6366f1;
      border-radius: 20px; display: inline-flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: 32px; color: white;
      margin-bottom: 24px;
    }
    h1 { font-size: 42px; margin-bottom: 12px; }
    p { color: #aaa; font-size: 17px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block; background: #6366f1; color: white;
      padding: 14px 32px; border-radius: 10px;
      text-decoration: none; font-weight: 600; margin: 6px;
      transition: background 0.2s;
    }
    .btn:hover { background: #5558d9; }
    .btn.secondary { background: transparent; border: 1px solid #333; }
    .footer { margin-top: 60px; font-size: 13px; color: #666; }
    .footer a { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-big">OR</div>
    <h1>OVA REAL</h1>
    <p>CRM + Automatización IA para agentes inmobiliarios.<br>
    Ingresa a tu portal con tu email y contraseña.</p>
    <a href="login.html" class="btn">Iniciar sesión</a>
    <a href="privacy.html" class="btn secondary">Privacidad</a>
    <div class="footer">
      <p>OVA VISION Agency &middot; <a href="https://ovavisionagency.com">ovavisionagency.com</a></p>
    </div>
  </div>
</body>
</html>
