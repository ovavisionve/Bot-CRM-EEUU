<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1877f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OVA REAL">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>OVA REAL - CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brand: #1877f2;
      --brand-dark: #166fe5;
      --brand-soft: #e7f3ff;
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface-alt: #f5f6f7;
      --border: #e4e6eb;
      --text: #1c1e21;
      --text-soft: #65676b;
      --text-muted: #8a8d91;
      --success: #42b72a;
      --success-bg: #e6f4ea;
      --warn: #f7b928;
      --warn-bg: #fff8e1;
      --danger: #fa383e;
      --danger-bg: #ffebe9;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; overflow: hidden; font-size: 14px;
    }
    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 340px; background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h1 {
      font-size: 15px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-header .logo {
      width: 30px; height: 30px; background: var(--brand); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: white;
    }
    .user-chip {
      padding: 12px 20px; background: var(--surface-alt);
      border-bottom: 1px solid var(--border); font-size: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .user-chip .who { color: var(--text-soft); }
    .user-chip .who strong { color: var(--text); display: block; font-size: 13px; }
    .user-chip button {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-soft); padding: 4px 10px; border-radius: 6px;
      font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .user-chip button:hover { border-color: var(--brand); color: var(--brand); }

    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
    .tab {
      flex: 1; padding: 11px; background: transparent; border: none;
      color: var(--text-soft); cursor: pointer; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
      border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab:hover { color: var(--text); background: var(--surface-alt); }

    .search-bar {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--surface); position: relative;
    }
    .search-bar input {
      width: 100%; padding: 8px 32px 8px 30px;
      background: var(--surface-alt); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
    }
    .search-bar input:focus { outline: none; border-color: var(--brand); background: var(--surface); }
    .search-bar::before {
      content: "🔍"; position: absolute; left: 22px; top: 50%;
      transform: translateY(-50%); font-size: 11px; opacity: 0.5; pointer-events: none;
    }
    .search-bar .clear {
      position: absolute; right: 22px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 16px; padding: 0; line-height: 1; display: none;
    }
    .search-bar .clear.show { display: block; }

    .panel-content { flex: 1; overflow-y: auto; background: var(--surface); }

    .lead-count {
      padding: 10px 20px; font-size: 11px; color: var(--text-soft);
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .lead-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; cursor: pointer;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .lead-item:hover { background: var(--surface-alt); }
    .lead-item.active { background: var(--brand-soft); border-left: 3px solid var(--brand); padding-left: 17px; }
    .lead-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--brand); color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 16px; flex-shrink: 0;
    }
    .lead-info { flex: 1; min-width: 0; }
    .lead-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .lead-time { font-size: 11px; color: var(--text-muted); }

    .main { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
    .main-header {
      padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: space-between;
    }
    .main-header h2 {
      font-size: 17px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .ai-badge {
      padding: 5px 12px; background: var(--success-bg); color: var(--success);
      border-radius: 14px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .ai-badge:hover { filter: brightness(0.95); }
    .ai-badge.paused { background: var(--warn-bg); color: #b57800; }

    /* Realtime indicator */
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--success); display: inline-block;
      margin-right: 6px; animation: pulse 1.6s ease-in-out infinite;
    }
    .live-dot.off { background: var(--text-muted); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.2); }
    }
    .live-status {
      font-size: 11px; color: var(--text-soft); display: inline-flex;
      align-items: center; padding: 2px 8px; background: var(--surface-alt);
      border-radius: 10px;
    }

    /* Typing indicator */
    .typing-bubble {
      align-self: flex-start; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px; display: inline-flex; gap: 4px;
      margin-bottom: 4px;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.4s ease-in-out infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Handoff queue */
    .handoff-view { padding: 20px 24px; overflow-y: auto; height: 100%; background: var(--bg); }
    .handoff-card {
      background: var(--surface); border: 1px solid var(--warn);
      border-left: 4px solid var(--warn); border-radius: 10px;
      padding: 16px; margin-bottom: 10px; cursor: pointer;
      box-shadow: var(--shadow-sm); display: flex;
      justify-content: space-between; align-items: center;
    }
    .handoff-card:hover { box-shadow: var(--shadow); }
    .handoff-card .who { font-weight: 600; color: var(--text); }
    .handoff-card .meta { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

    /* Notification toast nuevo mensaje */
    .new-msg-toast {
      position: fixed; top: 70px; right: 20px;
      background: var(--brand); color: white;
      padding: 12px 20px; border-radius: 8px;
      font-weight: 600; opacity: 0; transform: translateX(20px);
      transition: all 0.3s; z-index: 1000;
      box-shadow: var(--shadow); cursor: pointer;
      font-size: 13px;
    }
    .new-msg-toast.show { opacity: 1; transform: translateX(0); }

    .lead-detail-bar {
      padding: 12px 24px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: var(--text);
    }
    .detail-item { display: flex; gap: 4px; align-items: center; }
    .detail-item strong { color: var(--text-soft); font-weight: 500; }

    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 8px; }
    .chat-composer {
      border-top: 1px solid var(--border);
      padding: 12px 16px; background: var(--surface);
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-composer-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-input {
      flex: 1; padding: 10px 14px; background: var(--surface-alt);
      color: var(--text); border: 1px solid var(--border); border-radius: 18px;
      font-size: 14px; font-family: inherit;
      resize: none; min-height: 40px; max-height: 120px;
    }
    .chat-input:focus { outline: none; border-color: var(--brand); background: var(--surface); }
    .chat-send {
      background: var(--brand); color: white; border: none;
      padding: 10px 20px; border-radius: 20px; cursor: pointer;
      font-size: 14px; font-weight: 600; white-space: nowrap;
    }
    .chat-send:hover { background: var(--brand-dark); }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-options {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: var(--text-soft);
    }
    .chat-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chat-options input[type="checkbox"] { accent-color: var(--brand); }

    .message { display: flex; max-width: 65%; }
    .message.inbound { align-self: flex-start; }
    .message.outbound { align-self: flex-end; }
    .bubble { padding: 9px 14px; border-radius: 18px; font-size: 14px; line-height: 1.35; }
    .inbound .bubble {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-bottom-left-radius: 4px;
    }
    .outbound .bubble { background: var(--brand); color: white; border-bottom-right-radius: 4px; }
    .message.outbound.agent .bubble { background: var(--success); color: white; }
    .msg-time { display: block; font-size: 10px; margin-top: 3px; text-align: right; opacity: 0.65; }
    .message.agent-tag {
      font-size: 10px; color: var(--success); margin-top: 2px;
      text-align: right; font-weight: 500;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--surface); border-radius: 12px;
      padding: 24px; width: 560px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .modal h2 { margin-bottom: 16px; font-size: 20px; color: var(--text); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
    .modal-grid label, .modal-full label {
      display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 4px; font-weight: 500;
    }
    .modal-grid input, .modal-grid select, .modal-full input, .modal-full textarea {
      width: 100%; padding: 9px 11px; background: var(--surface-alt);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .modal-grid input:focus, .modal-grid select:focus, .modal-full input:focus, .modal-full textarea:focus {
      outline: none; border-color: var(--brand); background: var(--surface);
    }
    .modal-full { grid-column: 1 / -1; }

    .edit-btn {
      background: var(--surface-alt); color: var(--brand);
      border: 1px solid var(--border);
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      font-size: 12px; font-weight: 500; margin-left: 8px; transition: all 0.15s;
    }
    .edit-btn:hover { border-color: var(--brand); background: var(--brand-soft); }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: var(--text-muted); padding: 40px;
    }
    .empty-state .icon-box {
      width: 64px; height: 64px; background: var(--surface);
      border-radius: 16px; display: flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: var(--brand);
      margin-bottom: 16px; border: 1px solid var(--border);
    }

    .status-badge {
      font-size: 10px; padding: 3px 8px; border-radius: 10px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .status-new { background: #e7f3ff; color: #1877f2; }
    .status-contacted { background: #fff8e1; color: #b57800; }
    .status-qualified { background: var(--success-bg); color: var(--success); }
    .status-disqualified { background: var(--danger-bg); color: var(--danger); }
    .status-touring { background: #f3e8ff; color: #7c3aed; }
    .status-tour_confirmed { background: var(--success-bg); color: var(--success); }
    .status-closed_won { background: #dcfce7; color: #15803d; }
    .status-closed_lost { background: var(--danger-bg); color: var(--danger); }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #bcc0c4; border-radius: 5px; border: 2px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: #9fa2a7; }

    .config-view { padding: 24px 32px; overflow-y: auto; height: 100%; background: var(--bg); }
    .config-view h2 { font-size: 22px; margin-bottom: 16px; color: var(--text); }
    .config-view h3 {
      font-size: 12px; color: var(--brand); text-transform: uppercase;
      margin-top: 28px; margin-bottom: 12px; letter-spacing: 0.5px; font-weight: 700;
    }
    .config-row {
      margin-bottom: 12px; background: var(--surface);
      padding: 12px; border-radius: 8px; border: 1px solid var(--border);
    }
    .config-row label {
      display: block; font-size: 12px; color: var(--text-soft);
      margin-bottom: 4px; font-weight: 500;
    }
    .config-row input, .config-row select, .config-row textarea {
      width: 100%; padding: 9px 11px; background: var(--surface-alt);
      color: var(--text); border: 1px solid var(--border); border-radius: 6px;
      font-size: 14px; font-family: inherit;
    }
    .config-row input:focus, .config-row select:focus, .config-row textarea:focus {
      outline: none; border-color: var(--brand); background: var(--surface);
    }
    .btn {
      background: var(--brand); color: white; border: none;
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 600; transition: background 0.15s;
    }
    .btn:hover { background: var(--brand-dark); }
    .btn-secondary { background: var(--surface-alt); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    .feature-list { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
    .feature-badge {
      padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; font-size: 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .feature-badge.enabled { border-color: var(--success); color: var(--success); background: var(--success-bg); }
    .feature-badge.disabled { color: var(--text-muted); }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--success); color: white;
      padding: 12px 20px; border-radius: 8px;
      font-weight: 600; opacity: 0;
      transition: opacity 0.3s; z-index: 1000;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); }

    .top-nav {
      display: flex; gap: 4px; padding: 10px 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .nav-btn {
      padding: 8px 16px; background: transparent; border: none;
      color: var(--text-soft); cursor: pointer;
      font-size: 13px; font-weight: 500;
      border-radius: 6px; transition: all 0.15s;
    }
    .nav-btn:hover { background: var(--surface-alt); color: var(--text); }
    .nav-btn.active { background: var(--brand); color: white; }

    .kanban {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      display: flex; gap: 16px; padding: 16px; background: var(--bg);
    }
    .kanban-col {
      flex-shrink: 0; width: 280px;
      display: flex; flex-direction: column;
      background: var(--surface); border-radius: 10px;
      border: 1px solid var(--border); max-height: 100%;
    }
    .kanban-col.drag-over { border-color: var(--brand); background: var(--brand-soft); }
    .kanban-col-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-header h3 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text);
    }
    .kanban-col-header .col-count {
      background: var(--surface-alt); color: var(--text-soft); font-size: 11px;
      padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }
    .kanban-cards {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .kanban-card {
      background: var(--surface-alt); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; cursor: grab; transition: all 0.15s;
    }
    .kanban-card:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); }
    .kanban-card.dragging { opacity: 0.4; cursor: grabbing; }
    .kanban-card .card-name {
      font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .kanban-card .card-meta {
      font-size: 11px; color: var(--text-soft);
      display: flex; justify-content: space-between; align-items: center; margin-top: 6px;
    }
    .kanban-card .card-property {
      font-size: 11px; color: var(--brand); margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .kanban-col[data-status="new"] .kanban-col-header { border-top: 3px solid #1877f2; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="contacted"] .kanban-col-header { border-top: 3px solid #f7b928; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="qualified"] .kanban-col-header { border-top: 3px solid #42b72a; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="touring"] .kanban-col-header { border-top: 3px solid #7c3aed; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="tour_confirmed"] .kanban-col-header { border-top: 3px solid #42b72a; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="closed_won"] .kanban-col-header { border-top: 3px solid #15803d; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="disqualified"] .kanban-col-header { border-top: 3px solid #fa383e; border-radius: 10px 10px 0 0; }

    .main.has-topnav { display: flex; flex-direction: column; }

    .analytics { padding: 20px 24px; overflow-y: auto; height: 100%; background: var(--bg); }
    .analytics h3 {
      font-size: 12px; color: var(--brand); text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 700;
      margin-top: 24px; margin-bottom: 12px;
    }
    .analytics h3:first-of-type { margin-top: 0; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 16px; border-radius: 10px; box-shadow: var(--shadow-sm);
    }
    .stat-card .label {
      font-size: 11px; color: var(--text-soft);
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; color: var(--text); }
    .stat-card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .funnel { display: flex; flex-direction: column; gap: 6px; }
    .funnel-row { display: flex; align-items: center; gap: 10px; }
    .funnel-label { width: 150px; font-size: 12px; color: var(--text-soft); flex-shrink: 0; }
    .funnel-bar {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; height: 26px; position: relative; overflow: hidden;
    }
    .funnel-fill {
      height: 100%; transition: width 0.3s;
      display: flex; align-items: center; padding: 0 10px;
      font-size: 11px; font-weight: 700; color: white;
    }
    .rate-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .rate-card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 20px; border-radius: 10px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .rate-card .label {
      font-size: 11px; color: var(--text-soft); text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 600;
    }
    .rate-card .value { font-size: 36px; font-weight: 700; margin: 6px 0; color: var(--brand); }
    .day-chart {
      display: flex; align-items: flex-end; gap: 4px; height: 160px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px 10px 0 0; padding: 14px;
    }

    // ===== SUPABASE REALTIME =====
    // Suscribirse a INSERTs en conversations + UPDATEs en leads del tenant actual
    let realtimeChannel = null
    function startRealtime() {
      if (realtimeChannel) supabase.removeChannel(realtimeChannel)
      if (!currentTenant?.id) return

      realtimeChannel = supabase
        .channel("dashboard-rt-" + currentTenant.id)
        .on("postgres_changes", {
          event: "INSERT", schema: "public", table: "conversations",
          filter: "tenant_id=eq." + currentTenant.id,
        }, (payload) => onNewMessage(payload.new))
        .on("postgres_changes", {
          event: "UPDATE", schema: "public", table: "leads",
          filter: "tenant_id=eq." + currentTenant.id,
        }, (payload) => onLeadUpdate(payload.new))
        .on("postgres_changes", {
          event: "INSERT", schema: "public", table: "leads",
          filter: "tenant_id=eq." + currentTenant.id,
        }, (payload) => onLeadInsert(payload.new))
        .subscribe((status) => {
          const ind = document.getElementById("live-status")
          if (!ind) return
          if (status === "SUBSCRIBED") {
            ind.innerHTML = '<span class="live-dot"></span>en vivo'
          } else if (status === "CLOSED" || status === "CHANNEL_ERROR") {
            ind.innerHTML = '<span class="live-dot off"></span>desconectado'
          }
        })
    }
    startRealtime()

    function onNewMessage(msg) {
      // Actualizar lead en memoria si está en la lista
      const lead = leads.find(l => l.sender_id === msg.sender_id)
      if (lead) lead.updated_at = msg.created_at

      // Si el lead seleccionado coincide, agregar mensaje al chat sin refrescar todo
      if (selectedLead === msg.sender_id && currentMainView === "inbox") {
        appendMessageToChat(msg)
        // Si es inbound, ocultar typing indicator
        if (msg.direction === "inbound") removeTypingIndicator()
        // Si es outbound del bot, también ocultar typing
        if (msg.direction === "outbound") removeTypingIndicator()
      } else if (msg.direction === "inbound") {
        // Mensaje nuevo de otro lead → toast notif + reload lista
        showNewMsgToast(msg)
      }

      renderLeadsList()
    }

    function onLeadUpdate(updated) {
      const idx = leads.findIndex(l => l.sender_id === updated.sender_id)
      if (idx >= 0) leads[idx] = { ...leads[idx], ...updated }
      else leads.unshift(updated)
      renderLeadsList()
      if (currentMainView === "handoff") renderHandoffQueue()
      // Actualizar contador handoff
      updateHandoffBadge()
    }

    function onLeadInsert(newLead) {
      leads.unshift(newLead)
      renderLeadsList()
      showNewMsgToast({ sender_id: newLead.sender_id, message_text: "Nuevo lead!" }, true)
    }

    function appendMessageToChat(msg) {
      const chat = document.getElementById("chat")
      if (!chat) return
      const dir = msg.direction === "inbound" ? "inbound" : "outbound"
      const isAgent = msg.direction === "outbound" && msg.sent_by === "agent"
      const dirClass = dir + (isAgent ? " agent" : "")
      const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
      const div = document.createElement("div")
      div.className = "message " + dirClass
      div.innerHTML = '<div style="max-width:100%;"><div class="bubble">' +
        esc(msg.message_text) + '<span class="msg-time">' + time + '</span></div></div>'
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight

      // Si es inbound, mostrar typing del bot
      if (msg.direction === "inbound") {
        const lead = leads.find(l => l.sender_id === msg.sender_id)
        if (lead?.ai_active !== false) showTypingIndicator()
      }
    }

    function showTypingIndicator() {
      const chat = document.getElementById("chat")
      if (!chat || chat.querySelector(".typing-bubble")) return
      const div = document.createElement("div")
      div.className = "typing-bubble"
      div.innerHTML = "<span></span><span></span><span></span>"
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
    }
    function removeTypingIndicator() {
      const t = document.querySelector(".typing-bubble")
      if (t) t.remove()
    }

    function showNewMsgToast(msg, isNewLead) {
      const t = document.getElementById("new-msg-toast")
      const lead = leads.find(l => l.sender_id === msg.sender_id)
      const name = lead?.name || msg.sender_id || "Lead"
      lastNewMsgSender = msg.sender_id
      t.textContent = (isNewLead ? "🆕 Lead nuevo: " : "💬 Nuevo mensaje de ") + name
      t.classList.add("show")
      setTimeout(() => t.classList.remove("show"), 5000)
    }

    let parsedLeads = []
    function parseCsv(e) {
      const file = e.target.files[0]
      if (!file) return
      const reader = new FileReader()
      reader.onload = function(ev) {
        const text = ev.target.result
        const lines = text.split(/\r?\n/).filter(l => l.trim())
        if (lines.length < 2) { toast("CSV vacío", true); return }
        const headers = lines[0].split(",").map(h => h.trim().toLowerCase().replace(/"/g, ""))
        parsedLeads = []
        for (let i = 1; i < lines.length; i++) {
          const cells = parseCsvLine(lines[i])
          const row = {}
          for (let j = 0; j < headers.length; j++) row[headers[j]] = cells[j] || null
          parsedLeads.push(row)
        }
        const preview = document.getElementById("csv-preview")
        preview.style.display = "block"
        preview.textContent = "Parseados " + parsedLeads.length + " leads.\n\nPrimeros 3:\n" +
          JSON.stringify(parsedLeads.slice(0, 3), null, 2)
        document.getElementById("btn-import").disabled = false
      }
      reader.readAsText(file)
    }
    function parseCsvLine(line) {
      const out = []; let cur = ""; let inQ = false
      for (let i = 0; i < line.length; i++) {
        const c = line[i]
        if (c === '"') inQ = !inQ
        else if (c === "," && !inQ) { out.push(cur.trim()); cur = "" }
        else cur += c
      }
      out.push(cur.trim())
      return out
    }

    window.saveCampaignModal = async function() {
      const modal = document.getElementById("edit-camp-modal")
      const id = modal.dataset.campaignId
      const name = document.getElementById("c-name").value.trim()
      const trigger = document.getElementById("c-trigger").value
      if (!name) return toast("Nombre requerido", true)

      const stepEls = document.getElementById("c-steps").children
      const steps = []
      for (let i = 0; i < stepEls.length; i++) {
        const el = stepEls[i]
        const delay = Number(el.querySelector(".c-step-delay").value) || 0
        const channel = el.querySelector(".c-step-channel").value
        const msg = el.querySelector(".c-step-msg").value.trim()
        if (!msg) continue
        steps.push({ step: i + 1, delay_hours: delay, channel, message: msg })
      }
      if (steps.length === 0) return toast("Al menos 1 paso con mensaje", true)

      const action = id ? "update-campaign" : "create-campaign"
      const body = id
        ? { id, updates: { name, trigger, steps } }
        : { name, trigger, steps, tenant_slug: currentTenant.slug }
      const r = await api("?action=" + action, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      })
      if (r.ok) {
        toast("Guardada")
        closeCampModal()
        renderCampaigns()
      } else {
        toast(r.error || "Error", true)
      }
    }

    async function renderTours() {
      const mc = document.getElementById("main-content")
      mc.innerHTML = '<div class="tours-view"><div style="color:#666;padding:40px;text-align:center;">Cargando tours...</div></div>'

      const year = calCursor.getFullYear()
      const month = calCursor.getMonth()
      const from = new Date(year, month, 1).toISOString()
      const to = new Date(year, month + 1, 0, 23, 59, 59).toISOString()

      const slug = currentTenant?.slug || ""
      const res = await api("?action=tours&tenant=" + slug + "&from=" + from + "&to=" + to)
      toursCache = res.tours || []

      // Próximos 14 días
      const upcomingFrom = new Date().toISOString()
      const upcomingTo = new Date(Date.now() + 14*24*60*60*1000).toISOString()
      const upcRes = await api("?action=tours&tenant=" + slug + "&from=" + upcomingFrom + "&to=" + upcomingTo)
      const upcoming = upcRes.tours || []

      // Build calendar
      const monthName = calCursor.toLocaleString("es", { month: "long", year: "numeric" })
      const firstDay = new Date(year, month, 1).getDay() // 0=Sun
      const daysInMonth = new Date(year, month + 1, 0).getDate()
      const todayStr = new Date().toISOString().slice(0, 10)

      // Agrupar tours por fecha
      const byDate = {}
      for (const t of toursCache) {
        const key = t.scheduled_at.slice(0, 10)
        if (!byDate[key]) byDate[key] = []
        byDate[key].push(t)
      }

      let calHTML = '<div class="calendar">' +
        '<div class="calendar-nav">' +
          '<button onclick="shiftMonth(-1)">‹ Anterior</button>' +
          '<h3>' + esc(monthName) + '</h3>' +
          '<button onclick="shiftMonth(1)">Siguiente ›</button>' +
        '</div>' +
        '<div class="calendar-grid">'
      const dows = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]
      for (const d of dows) calHTML += '<div class="cal-dow">' + d + '</div>'

      // Celdas en blanco antes del día 1
      for (let i = 0; i < firstDay; i++) calHTML += '<div class="cal-day other-month"></div>'

      for (let d = 1; d <= daysInMonth; d++) {
        const dateKey = new Date(year, month, d).toISOString().slice(0, 10)
        const isToday = dateKey === todayStr
        const events = byDate[dateKey] || []
        calHTML += '<div class="cal-day' + (isToday ? ' today' : '') + '">' +
          '<span class="cal-day-num">' + d + '</span>'
        for (const ev of events.slice(0, 3)) {
          const time = new Date(ev.scheduled_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
          const name = ev.leads?.name || "Lead"
          const cls = ev.status === "confirmed" ? " confirmed" : ev.status === "completed" ? " completed" : ""
          calHTML += '<div class="cal-event' + cls + '">' + time + ' ' + esc(name) + '</div>'
        }
        if (events.length > 3) calHTML += '<div class="cal-event">+' + (events.length - 3) + ' más</div>'
        calHTML += '</div>'
      }
      calHTML += '</div></div>'

      // Upcoming list
      let listHTML = '<div class="tours-list">' +
        '<h3>Próximos 14 días (' + upcoming.length + ')</h3>'
      if (upcoming.length === 0) {
        listHTML += '<div style="color:var(--text-muted);padding:20px;text-align:center;">Sin tours agendados próximos.</div>'
      } else {
        for (const t of upcoming) {
          const dt = new Date(t.scheduled_at)
          const when = dt.toLocaleDateString("es", { weekday: "short", day: "numeric", month: "short" }) +
            " · " + dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
          const name = t.leads?.name || "Lead " + (t.leads?.sender_id || "")
          listHTML += '<div class="tour-item" onclick="openTourModal(' + t.id + ')">' +
            '<div><div class="tour-when">' + esc(when) + '</div>' +
            '<div class="tour-who">' + esc(name) + (t.notes ? ' · ' + esc(t.notes.substring(0, 60)) : '') + '</div></div>' +
            '<div class="tour-status"><span class="status-badge status-' +
              (t.status === "confirmed" ? "tour_confirmed" : "touring") + '">' + t.status + '</span></div>' +
          '</div>'
        }
      }
      listHTML += '</div>'

      mc.innerHTML = '<div class="tours-view">' +
        '<div class="tours-header"><h2>📅 Tours agendados</h2></div>' +
        calHTML + listHTML + '</div>'
    }

    function collectPropForm() {
      const num = id => {
        const v = document.getElementById(id).value.trim()
        if (v === "") return null
        const n = Number(v); return isNaN(n) ? null : n
      }
      const val = id => document.getElementById(id).value.trim()

      const fees = {}
      const f1 = num("ep-fees"); if (f1 !== null) fees.monthly_fees = f1
      const fi = val("ep-fees-incl"); if (fi) fees.includes = fi
      const p1 = num("ep-parking1"); if (p1 !== null) fees.parking_1 = p1
      const p2 = num("ep-parking2"); if (p2 !== null) fees.parking_2 = p2

      const promoTxt = val("ep-promo")
      const promotions = promoTxt ? [{ description: promoTxt, active: true }] : []

      return {
        name: val("ep-name"),
        address: val("ep-address"),
        city: val("ep-city") || null,
        state: val("ep-state") || null,
        zip: val("ep-zip") || null,
        type: val("ep-type") || null,
        bedrooms: num("ep-bedrooms"),
        bathrooms: num("ep-bathrooms"),
        sqft: num("ep-sqft"),
        base_price: num("ep-price"),
        fees: fees,
        promotions: promotions,
        min_credit_score: num("ep-min-credit") || 620,
        pets_allowed: val("ep-pets") === "true",
        esa_allowed: val("ep-esa") === "true",
        available: val("ep-avail") === "true",
        available_date: val("ep-avail-date") || null,
        priority: num("ep-priority") || 0,
        active: val("ep-active") === "true",
        notes: val("ep-notes") || null,
      }
    }

    async function renderAnalytics() {
      const mc = document.getElementById("main-content")
      mc.innerHTML = '<div class="analytics"><div style="color:#666; padding:60px; text-align:center;">Calculando métricas...</div></div>'

      const slug = currentTenant?.slug || ""
      const res = await fetch(API + "?action=analytics&tenant=" + encodeURIComponent(slug), {
        headers: { Authorization: "Bearer " + window.token },
      })

      if (res.status === 403) {
        mc.innerHTML =
          '<div class="analytics"><div class="analytics-locked">' +
            '<h2>📈 Analytics</h2>' +
            '<p>Esta feature no está activa en tu plan.</p>' +
            '<p style="margin-top:8px; font-size:13px;">Contactá a OVA VISION para activarla: ovavision.ve@gmail.com</p>' +
          '</div></div>'
        return
      }

      const data = await res.json()
      if (!data.totals) {
        mc.innerHTML = '<div class="analytics"><p style="color:#f87171;">Error cargando analytics.</p></div>'
        return
      }

      const t = data.totals
      const f = data.funnel
      const r = data.rates

      // Speed-to-lead
      let speed = "-"
      if (data.avg_response_seconds !== null) {
        const s = data.avg_response_seconds
        if (s < 60) speed = s + "s"
        else if (s < 3600) speed = Math.round(s / 60) + " min"
        else speed = (s / 3600).toFixed(1) + " h"
      }

      // Funnel bars
      const maxFunnel = Math.max(1, ...Object.values(f))
      const funnelOrder = [
        ["new", "Nuevos", "#60a5fa"],
        ["contacted", "Contactados", "#fbbf24"],
        ["qualified", "Calificados", "#34d399"],
        ["touring", "Tour propuesto", "#a78bfa"],
        ["tour_confirmed", "Tour confirmado", "#34d399"],
        ["closed_won", "Cerrados", "#4ade80"],
        ["disqualified", "Descalificados", "#f87171"],
      ]
      let funnelHTML = '<div class="funnel">'
      for (const [key, label, color] of funnelOrder) {
        const n = f[key] || 0
        const pct = Math.max(3, Math.round(n / maxFunnel * 100))
        funnelHTML += '<div class="funnel-row">' +
          '<div class="funnel-label">' + label + '</div>' +
          '<div class="funnel-bar"><div class="funnel-fill" style="width:' + pct + '%; background:' + color + ';">' + (n > 0 ? n : '') + '</div></div>' +
          '</div>'
      }
      funnelHTML += '</div>'

      // Chart de leads por día
      const days = Object.keys(data.leads_by_day)
      const maxDay = Math.max(1, ...Object.values(data.leads_by_day))
      let barsHTML = '<div class="day-chart">'
      for (const d of days) {
        const n = data.leads_by_day[d]
        const h = Math.max(2, Math.round(n / maxDay * 130))
        barsHTML += '<div class="day-bar" style="height:' + h + 'px" title="' + d + ': ' + n + ' leads"></div>'
      }
      barsHTML += '</div><div class="day-labels">'
      for (const d of days) {
        const label = d.slice(5)
        barsHTML += '<div class="day-label">' + label + '</div>'
      }
      barsHTML += '</div>'

      const analyticsExportBar = hasFeature("reports_export") ? (
        '<div class="export-bar">' +
          '<span class="label">Exportar:</span>' +
          '<button class="export-btn" onclick="downloadExport(\'analytics\', \'csv\')">📊 Analytics CSV</button>' +
          '<button class="export-btn" onclick="downloadExport(\'analytics\', \'json\')">📋 Analytics JSON</button>' +
          '<button class="export-btn" onclick="downloadExport(\'leads\', \'csv\')">📇 Leads CSV</button>' +
          '<button class="export-btn" onclick="downloadExport(\'leads\', \'json\')">📇 Leads JSON</button>' +
          '<button class="export-btn" onclick="downloadExport(\'conversations\', \'csv\')">💬 Conversaciones CSV</button>' +
        '</div>'
      ) : ''

      mc.innerHTML = '<div class="analytics">' +
        analyticsExportBar +
        '<h3>Resumen</h3>' +
        '<div class="stat-grid">' +
          '<div class="stat-card"><div class="label">Leads hoy</div><div class="value">' + t.leads_today + '</div></div>' +
          '<div class="stat-card"><div class="label">Últimos 7 días</div><div class="value">' + t.leads_week + '</div></div>' +
          '<div class="stat-card"><div class="label">Últimos 30 días</div><div class="value">' + t.leads_month + '</div></div>' +
          '<div class="stat-card"><div class="label">Total leads</div><div class="value">' + t.leads + '</div></div>' +
          '<div class="stat-card"><div class="label">Mensajes total</div><div class="value">' + t.messages + '</div><div class="sub">' + t.inbound + ' in · ' + t.outbound + ' out</div></div>' +
          '<div class="stat-card"><div class="label">Speed-to-lead</div><div class="value">' + speed + '</div><div class="sub">Tiempo promedio 1ra respuesta</div></div>' +
        '</div>' +

    function renderPipeline() {
      const mc = document.getElementById("main-content")
      // Agrupar leads por status
      const byStatus = {}
      for (const col of STATUS_COLS) byStatus[col.key] = []
      for (const l of leads) {
        const s = l.status || "new"
        if (byStatus[s]) byStatus[s].push(l)
        else byStatus["new"].push(l)
      }
      let html = '<div class="kanban" id="kanban">'
      for (const col of STATUS_COLS) {
        const colLeads = byStatus[col.key] || []
        html += '<div class="kanban-col" data-status="' + col.key + '" ondragover="kanbanDragOver(event)" ondragleave="kanbanDragLeave(event)" ondrop="kanbanDrop(event, \'' + col.key + '\')">'
        html += '<div class="kanban-col-header"><h3>' + col.label + '</h3><span class="col-count">' + colLeads.length + '</span></div>'
        html += '<div class="kanban-cards">'
        for (const l of colLeads) {
          const name = l.name || "Lead " + l.sender_id
          html += '<div class="kanban-card" draggable="true" data-sender-id="' + l.sender_id + '"' +
            ' ondragstart="kanbanDragStart(event, \'' + l.sender_id + '\')"' +
            ' ondragend="kanbanDragEnd(event)"' +
            ' onclick="openLeadFromKanban(\'' + l.sender_id + '\')">' +
            '<div class="card-name">' + esc(name) + '</div>'
          if (l.selected_property_name) html += '<div class="card-property">' + esc(l.selected_property_name) + '</div>'
          html += '<div class="card-meta">'
          html += '<span>' + (l.language || "en") + (l.credit_score ? ' · ' + l.credit_score + ' crédito' : '') + '</span>'
          html += '<span>' + getTimeAgo(l.updated_at || l.created_at) + '</span>'
          html += '</div></div>'
        }
        if (colLeads.length === 0) {
          html += '<div style="padding:20px; text-align:center; color:#555; font-size:12px;">Sin leads</div>'
        }
        html += '</div></div>'
      }
      html += '</div>'
      mc.innerHTML = html
    }

    window.kanbanDragStart = function(ev, senderId) {
      ev.dataTransfer.setData("text/plain", senderId)
      ev.target.classList.add("dragging")
    }
    window.kanbanDragEnd = function(ev) {
      ev.target.classList.remove("dragging")
    }
    window.kanbanDragOver = function(ev) {
      ev.preventDefault()
      ev.currentTarget.classList.add("drag-over")
    }
    window.kanbanDragLeave = function(ev) {
      ev.currentTarget.classList.remove("drag-over")
    }
    window.kanbanDrop = async function(ev, newStatus) {
      ev.preventDefault()
      ev.currentTarget.classList.remove("drag-over")
      const senderId = ev.dataTransfer.getData("text/plain")
      if (!senderId) return
      // Actualizar local inmediatamente (optimista)
      const lead = leads.find(l => l.sender_id === senderId)
      if (!lead || lead.status === newStatus) return
      const oldStatus = lead.status
      lead.status = newStatus
      renderPipeline()
      // Persistir en DB
      const r = await api("?action=bulk-update-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender_ids: [senderId], new_status: newStatus }),
      })
      if (r.ok) {
        toast("Movido a " + newStatus)
      } else {
        lead.status = oldStatus
        renderPipeline()
        toast(r.error || "Error", true)
      }
    }

    async function api(path, init = {}) {
      const res = await fetch(API + path, {
        ...init,
        headers: { ...(init.headers || {}), Authorization: "Bearer " + window.token },
      })
      return res.json()
    }

    // Helper para descargar un export (llama al endpoint con Auth y dispara download)
    window.downloadExport = async function(type, format) {
      const slug = currentTenant?.slug || ""
      const qs = new URLSearchParams({ action: "export", type, format, tenant: slug })
      const res = await fetch(API + "?" + qs.toString(), {
        headers: { Authorization: "Bearer " + window.token },
      })
      if (!res.ok) {
        toast("Error al exportar: " + res.status, true)
        return
      }
      const blob = await res.blob()
      // Extraer filename del header Content-Disposition
      const cd = res.headers.get("Content-Disposition") || ""
      const match = cd.match(/filename="?([^"]+)"?/)
      const filename = match ? match[1] : (type + "_export." + format)
      const url = URL.createObjectURL(blob)
      const a = document.createElement("a")
      a.href = url
      a.download = filename
      document.body.appendChild(a)
      a.click()
      document.body.removeChild(a)
      setTimeout(() => URL.revokeObjectURL(url), 1000)
      toast("Descargado: " + filename)
    }

    function filterLeads() {
      if (!searchTerm) return leads
      const q = searchTerm.toLowerCase()
      return leads.filter(l => {
        return (l.name || "").toLowerCase().includes(q)
          || (l.sender_id || "").toLowerCase().includes(q)
          || (l.email || "").toLowerCase().includes(q)
          || (l.phone || "").toLowerCase().includes(q)
          || (l.instagram_handle || "").toLowerCase().includes(q)
          || (l.partner_name || "").toLowerCase().includes(q)
          || (l.selected_property_name || "").toLowerCase().includes(q)
          || (l.status || "").toLowerCase().includes(q)
      })
    }

    function renderLeadsList() {
      const content = document.getElementById("sidebar-content")
      const filtered = filterLeads()
      const countLabel = searchTerm
        ? 'Leads (' + filtered.length + ' de ' + leads.length + ')'
        : 'Leads (' + leads.length + ')'
      content.innerHTML = '<div class="lead-count">' + countLabel + '</div>'

        content.innerHTML += '<div style="padding:40px; text-align:center; color:#666; font-size:13px;">Sin leads aún.<br>Cuando alguien te escriba por IG aparece acá.</div>'

        content.innerHTML += '<div style="padding:40px; text-align:center; color:#666; font-size:13px;">Sin resultados para "' + esc(searchTerm) + '"</div>'
        return

      content.innerHTML += filtered.map(function(l) {

        const name = l.name || "Lead " + l.sender_id

    function renderChat(lead, msgs) {
      const main = document.getElementById("main-content")
      if (!lead) return
      const name = lead.name || "Lead " + lead.sender_id
      const aiBadge = lead.ai_active === false
        ? '<button class="ai-badge paused" onclick="toggleAI(\'' + lead.sender_id + '\', true)">Bot pausado - Activar</button>'
        : '<button class="ai-badge" onclick="toggleAI(\'' + lead.sender_id + '\', false)">Bot activo - Pausar</button>'

      let detailHTML = '<div class="lead-detail-bar">'
      detailHTML += '<div class="detail-item"><strong>ID:</strong> ' + esc(lead.sender_id) + '</div>'
      detailHTML += '<div class="detail-item"><strong>Status:</strong> <span class="status-badge status-' + lead.status + '">' + lead.status + '</span></div>'
      detailHTML += '<div class="detail-item"><strong>Idioma:</strong> ' + (lead.language || "en") + '</div>'
      if (lead.credit_score) detailHTML += '<div class="detail-item"><strong>Crédito:</strong> ' + lead.credit_score + '</div>'
      if (lead.pets) detailHTML += '<div class="detail-item"><strong>Mascotas:</strong> ' + lead.pets + '</div>'
      if (lead.occupants) detailHTML += '<div class="detail-item"><strong>Ocupantes:</strong> ' + lead.occupants + '</div>'
      if (lead.selected_property_name) detailHTML += '<div class="detail-item"><strong>Propiedad:</strong> ' + esc(lead.selected_property_name) + '</div>'
      if (lead.tour_date) detailHTML += '<div class="detail-item"><strong>Tour:</strong> ' + esc(lead.tour_date) + '</div>'
      if (lead.sentiment) {
        const sentEmoji = { positive:"😊", neutral:"😐", negative:"😞", frustrated:"😤" }
        detailHTML += '<div class="detail-item"><strong>Sentimiento:</strong> ' + (sentEmoji[lead.sentiment]||"") + ' ' + lead.sentiment + '</div>'
      }
      if (lead.close_probability != null) {
        const cpColor = lead.close_probability >= 70 ? "var(--success)" : lead.close_probability >= 40 ? "var(--warn)" : "var(--danger)"
        detailHTML += '<div class="detail-item"><strong>Prob. cierre:</strong> <span style="color:' + cpColor + ';font-weight:700;">' + lead.close_probability + '%</span></div>'
      }
      if (lead.score) detailHTML += '<div class="detail-item"><strong>Score:</strong> ' + lead.score + '/100</div>'
      detailHTML += '<div class="detail-item"><strong>Mensajes:</strong> ' + msgs.length + '</div>'
      detailHTML += '</div>'

      const chatHTML = msgs.map(function(m) {
        const dir = m.direction === "inbound" ? "inbound" : "outbound"
        const isAgent = m.direction === "outbound" && m.sent_by === "agent"
        const dirClass = dir + (isAgent ? " agent" : "")
        const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        const agentTag = isAgent ? '<div class="agent-tag">Enviado por vos</div>' : ''
        return '<div class="message ' + dirClass + '"><div style="max-width:100%;">' +
          '<div class="bubble">' + esc(m.message_text) +
          '<span class="msg-time">' + time + '</span></div>' +
          agentTag + '</div></div>'
      }).join("")

      const composerHTML =
        '<div class="chat-composer">' +
          '<div class="chat-composer-row">' +
            '<textarea class="chat-input" id="msg-input" placeholder="Escribí un mensaje manual al lead..." rows="1"></textarea>' +
            '<button class="chat-send" id="msg-send" onclick="sendManualMessage(\'' + lead.sender_id + '\')">Enviar</button>' +
          '</div>' +
          '<div class="chat-options">' +
            '<label><input type="checkbox" id="msg-pause-bot" ' + (lead.ai_active === false ? '' : 'checked') + '/> Pausar bot después de enviar</label>' +
          '</div>' +
        '</div>'

      const editBtnHTML = hasFeature("lead_editing")
        ? '<button class="edit-btn" onclick="openEditModal(\'' + lead.sender_id + '\')">Editar</button>' : ''
      const exportChatBtnHTML = hasFeature("reports_export")
        ? '<button class="edit-btn" onclick="downloadChat(\'' + lead.sender_id + '\')" title="Descargar conversación">⬇ CSV</button>' : ''
      const composerFinalHTML = hasFeature("manual_messaging") ? composerHTML : ''

      main.innerHTML =
        '<div class="main-header">' +
          '<h2>' + esc(name) + editBtnHTML + exportChatBtnHTML + '</h2>' +
          aiBadge +
        '</div>' +
        detailHTML +
        '<div class="chat-container">' +
          '<div class="chat" id="chat">' + (chatHTML || '<div class="empty-state" style="padding:40px 0;"><p>Sin mensajes aún</p></div>') + '</div>' +
          composerFinalHTML +
        '</div>'

      const chat = document.getElementById("chat")
      if (chat) chat.scrollTop = chat.scrollHeight

      // Enter para enviar, Shift+Enter para nueva línea
      const input = document.getElementById("msg-input")
      if (input) {
        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault()
            window.sendManualMessage(lead.sender_id)
          }
        })
        input.focus()
      }
    }

      const input = document.getElementById("msg-input")
      const btn = document.getElementById("msg-send")
      const pauseChk = document.getElementById("msg-pause-bot")
      const texto = (input?.value || "").trim()
      if (!texto) return
      if (btn) { btn.disabled = true; btn.textContent = "Enviando..." }

      const r = await api("?action=send-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sender_id: senderId,
          texto,
          pause_bot: !!pauseChk?.checked,
        }),
      })

      if (btn) { btn.disabled = false; btn.textContent = "Enviar" }

      if (r.ok) {
        if (input) input.value = ""
        toast("Mensaje enviado")
        // Refrescar la conversación
        await loadLeads()
        if (selectedLead) selectLead(selectedLead)
      } else {
        toast(r.error || "Error enviando mensaje", true)
      }
    }

      const voice = document.getElementById("c-agent-voice").value
      const r = await api("?action=update-agent-config", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug: currentTenant.slug, updates: { agent_voice: voice } }),
      })
      if (r.ok) { window._agentVoiceValue = voice; toast("Voz del bot guardada") }
      else toast(r.error || "Error", true)
    }

    async function saveConfig() {
      const updates = {
        agent_name: document.getElementById("c-agent-name").value,
        agent_email: document.getElementById("c-agent-email").value,
        agent_phone: document.getElementById("c-agent-phone").value,
        agent_language: document.getElementById("c-agent-language").value,
        bot_name: document.getElementById("c-bot-name").value,
        bot_active: document.getElementById("c-bot-active").value === "true",
        google_sheet_id: document.getElementById("c-sheet-id").value,
      }
      const r = await api("?action=update-tenant", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug: currentTenant.slug, updates }),
      })
      if (r.ok) {
        toast("Guardado")
        const me = await api("?action=me")
        currentTenant = me.tenant
      } else toast(r.error || "Error", true)
    }

    function toast(msg, isError) {
      const el = document.getElementById("toast")
      el.textContent = msg
      el.className = "toast show" + (isError ? " error" : "")
      setTimeout(() => el.className = "toast", 2500)
    }

    function esc(s) {
      if (s === null || s === undefined) return ""
      const d = document.createElement("div")
      d.textContent = String(s)
      return d.innerHTML
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return ""
      const diff = Date.now() - new Date(dateStr).getTime()
      const mins = Math.floor(diff / 60000)
      if (mins < 1) return "ahora"
      if (mins < 60) return mins + "m"
      const hours = Math.floor(mins / 60)
      if (hours < 24) return hours + "h"
      return Math.floor(hours / 24) + "d"
    }

    // Auto-refresh (solo si Realtime no está activo)
    setInterval(() => { if (currentView === "leads") loadLeads() }, 15000)

    // ===== PWA: Registro Service Worker + Push Notifications =====
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").then(function(reg) {
        console.log("[PWA] Service Worker registrado")
        // Push subscription (si la feature está ON y se concede permiso)
        if (currentTenant?.features?.push_notifications && "PushManager" in window) {
          Notification.requestPermission().then(function(perm) {
            if (perm === "granted") {
              const vapidKey = "BPeK_hfHBV2gxO4MW79gFFMLeJ7sb0w9KNoXw5x5vJuscWxzUm5418j3-xFfKbuhiS_u-3EwWDZ0CQbDUdEqfFY"
              if (vapidKey.startsWith("REPLACE")) return // no configurado
              reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlB64ToUint8Array(vapidKey),
              }).then(function(sub) {
                fetch(SUPABASE_URL + "/functions/v1/dashboard?action=push-subscribe", {
                  method: "POST",
                  headers: { Authorization: "Bearer " + window.token, "Content-Type": "application/json" },
                  body: JSON.stringify({ subscription: sub.toJSON() }),
                })
                console.log("[PWA] Push subscription OK")
              }).catch(function(e) { console.warn("[PWA] Push subscribe failed:", e) })
            }
          })
        }
      }).catch(function(e) { console.warn("[PWA] SW registration failed:", e) })
    }

    function urlB64ToUint8Array(base64String) {
      const padding = "=".repeat((4 - base64String.length % 4) % 4)
      const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/")
      const rawData = atob(base64)
      const arr = new Uint8Array(rawData.length)
      for (let i = 0; i < rawData.length; ++i) arr[i] = rawData.charCodeAt(i)
      return arr
    }
  </script>
