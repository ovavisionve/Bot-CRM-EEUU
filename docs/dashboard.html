<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL - CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f; color: #e0e0e0;
      height: 100vh; overflow: hidden;
    }
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 340px;
      border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column;
      background: #141414;
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h1 {
      font-size: 15px; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: 10px;
    }
    .sidebar-header .logo {
      width: 28px; height: 28px; background: #6366f1; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff;
    }
    .user-chip {
      padding: 10px 20px; background: #1a1a2e;
      border-bottom: 1px solid #2a2a2a; font-size: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .user-chip .who { color: #aaa; }
    .user-chip .who strong { color: #e0e0e0; display: block; font-size: 13px; }
    .user-chip button {
      background: transparent; border: 1px solid #333;
      color: #888; padding: 4px 10px; border-radius: 4px;
      font-size: 11px; cursor: pointer;
    }
    .user-chip button:hover { border-color: #666; color: #e0e0e0; }

    .tabs {
      display: flex; border-bottom: 1px solid #2a2a2a;
    }
    .tab {
      flex: 1; padding: 10px; background: transparent; border: none;
      color: #888; cursor: pointer; font-size: 12px;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; }
    .tab:hover { color: #e0e0e0; }

    .search-bar {
      padding: 10px 14px;
      border-bottom: 1px solid #2a2a2a;
      background: #141414;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 8px 32px 8px 30px;
      background: #0f0f0f;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 13px;
    }
    .search-bar input:focus { outline: none; border-color: #6366f1; }
    .search-bar::before {
      content: "🔍";
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      opacity: 0.5;
      pointer-events: none;
    }
    .search-bar .clear {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      display: none;
    }
    .search-bar .clear.show { display: block; }
    .search-bar .clear:hover { color: #e0e0e0; }

    .panel-content { flex: 1; overflow-y: auto; }

    /* Pipeline Kanban (en vista leads cuando está colapsado) */
    .lead-count {
      padding: 10px 20px; font-size: 11px; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .lead-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid #1e1e1e; transition: background 0.15s;
    }
    .lead-item:hover { background: #1e1e1e; }
    .lead-item.active { background: #1e1e3a; border-left: 3px solid #6366f1; }
    .lead-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #2a2a4a;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 16px; color: #a5b4fc; flex-shrink: 0;
    }
    .lead-info { flex: 1; min-width: 0; }
    .lead-name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .lead-time { font-size: 11px; color: #666; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; }
    .main-header {
      padding: 14px 24px; border-bottom: 1px solid #2a2a2a; background: #141414;
      display: flex; align-items: center; justify-content: space-between;
    }
    .main-header h2 { font-size: 16px; font-weight: 600; }
    .ai-badge {
      padding: 4px 10px; background: #1e3b2f; color: #34d399;
      border-radius: 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: none;
    }
    .ai-badge.paused { background: #3b2f1e; color: #fbbf24; }

    .lead-detail-bar {
      padding: 12px 24px; background: #1a1a2e;
      border-bottom: 1px solid #2a2a2a;
      display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px;
    }
    .detail-item { display: flex; gap: 4px; align-items: center; }

    /* Chat */
    .chat-container {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .chat {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-composer {
      border-top: 1px solid #2a2a2a;
      padding: 12px 16px; background: #141414;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-composer-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; padding: 10px 12px; background: #0f0f0f;
      color: #e0e0e0; border: 1px solid #2a2a2a; border-radius: 8px;
      font-size: 14px; font-family: inherit;
      resize: none; min-height: 40px; max-height: 120px;
    }
    .chat-input:focus { outline: none; border-color: #6366f1; }
    .chat-send {
      background: #6366f1; color: white; border: none;
      padding: 10px 18px; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; white-space: nowrap;
    }
    .chat-send:hover { background: #5558d9; }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-options {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; color: #888;
    }
    .chat-options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .chat-options input[type="checkbox"] { accent-color: #6366f1; }
    .message.outbound.agent .bubble {
      background: #1e3b2f; color: #86efac;
    }
    .message.agent-tag {
      font-size: 10px; color: #86efac; margin-top: 2px;
      text-align: right;
    }

    /* Modal edit lead */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center; z-index: 500;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #141414; border: 1px solid #2a2a2a;
      border-radius: 12px; padding: 24px; width: 560px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin-bottom: 16px; font-size: 18px; }
    .modal-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px;
    }
    .modal-grid label, .modal-full label {
      display: block; font-size: 12px; color: #888; margin-bottom: 4px;
    }
    .modal-grid input, .modal-grid select, .modal-full input, .modal-full textarea {
      width: 100%; padding: 8px 10px; background: #0f0f0f;
      color: #e0e0e0; border: 1px solid #333; border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .modal-full { grid-column: 1 / -1; }
    .edit-btn {
      background: #1a1a1a; color: #a5b4fc; border: 1px solid #2a2a2a;
      padding: 4px 10px; border-radius: 6px; cursor: pointer;
      font-size: 11px; font-weight: 500; margin-left: 8px;
    }
    .edit-btn:hover { border-color: #6366f1; color: #c7d2fe; }
    .message { display: flex; max-width: 65%; }
    .message.inbound { align-self: flex-start; }
    .message.outbound { align-self: flex-end; }
    .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
    .inbound .bubble { background: #2a2a2a; border-bottom-left-radius: 4px; }
    .outbound .bubble { background: #3730a3; color: #e0e7ff; border-bottom-right-radius: 4px; }
    .msg-time { display: block; font-size: 10px; color: #888; margin-top: 4px; text-align: right; }
    .outbound .msg-time { color: #a5b4fc; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #555;
    }
    .empty-state .icon-box {
      width: 60px; height: 60px; background: #1a1a1a;
      border-radius: 12px; display: flex;
      align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 16px;
      border: 1px solid #2a2a2a;
    }

    .status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      font-weight: 600; text-transform: uppercase;
    }
    .status-new { background: #1e3a5f; color: #60a5fa; }
    .status-contacted { background: #3b2f1e; color: #fbbf24; }
    .status-qualified { background: #1e3b2f; color: #34d399; }
    .status-disqualified { background: #3b1e1e; color: #f87171; }
    .status-touring { background: #2e1e3b; color: #a78bfa; }
    .status-tour_confirmed { background: #1e3b2f; color: #34d399; }
    .status-closed_won { background: #1e3b1e; color: #4ade80; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Config view */
    .config-view { padding: 24px 32px; overflow-y: auto; height: 100%; }
    .config-view h2 { font-size: 20px; margin-bottom: 16px; }
    .config-view h3 { font-size: 14px; color: #6366f1; text-transform: uppercase; margin-top: 24px; margin-bottom: 12px; }
    .config-row { margin-bottom: 16px; }
    .config-row label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .config-row input, .config-row select, .config-row textarea {
      width: 100%; padding: 10px 12px; background: #141414;
      color: #e0e0e0; border: 1px solid #2a2a2a; border-radius: 6px;
      font-size: 14px;
    }
    .btn {
      background: #6366f1; color: white; border: none;
      padding: 10px 20px; border-radius: 6px; cursor: pointer;
      font-size: 14px; font-weight: 500;
    }
    .btn:hover { background: #5558d9; }
    .btn-secondary { background: #333; }

    .feature-list { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
    .feature-badge {
      padding: 10px 14px; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; font-size: 13px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .feature-badge.enabled { border-color: #1e3b2f; color: #34d399; }
    .feature-badge.disabled { color: #666; }

    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #34d399; color: #0f0f0f;
      padding: 12px 20px; border-radius: 8px;
      font-weight: 600; opacity: 0;
      transition: opacity 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #dc2626; color: white; }

    /* Top nav (Inbox | Pipeline | Config) */
    .top-nav {
      display: flex; gap: 4px;
      padding: 10px 16px; background: #141414;
      border-bottom: 1px solid #2a2a2a;
      align-items: center;
    }
    .nav-btn {
      padding: 8px 16px; background: transparent;
      border: none; color: #888; cursor: pointer;
      font-size: 13px; font-weight: 500;
      border-radius: 6px; transition: all 0.15s;
    }
    .nav-btn:hover { background: #1e1e1e; color: #e0e0e0; }
    .nav-btn.active { background: #6366f1; color: white; }
    .nav-btn .count {
      font-size: 11px; margin-left: 6px; opacity: 0.8;
    }

    /* Kanban Pipeline */
    .kanban {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      display: flex; gap: 16px; padding: 16px;
      background: #0f0f0f;
    }
    .kanban-col {
      flex-shrink: 0; width: 280px;
      display: flex; flex-direction: column;
      background: #141414; border-radius: 10px;
      border: 1px solid #2a2a2a;
      max-height: 100%;
    }
    .kanban-col.drag-over {
      border-color: #6366f1;
      background: #1e1e3a;
    }
    .kanban-col-header {
      padding: 14px 16px; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-header h3 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #e0e0e0;
    }
    .kanban-col-header .col-count {
      background: #2a2a2a; color: #aaa; font-size: 11px;
      padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }
    .kanban-cards {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .kanban-card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 12px; cursor: grab;
      transition: all 0.15s;
    }
    .kanban-card:hover { border-color: #444; }
    .kanban-card.dragging { opacity: 0.4; cursor: grabbing; }
    .kanban-card .card-name {
      font-size: 14px; font-weight: 600; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .kanban-card .card-meta {
      font-size: 11px; color: #888;
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 6px;
    }
    .kanban-card .card-property {
      font-size: 11px; color: #a5b4fc; margin-top: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Columnas específicas por status */
    .kanban-col[data-status="new"] .kanban-col-header { border-top: 3px solid #60a5fa; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="contacted"] .kanban-col-header { border-top: 3px solid #fbbf24; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="qualified"] .kanban-col-header { border-top: 3px solid #34d399; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="touring"] .kanban-col-header { border-top: 3px solid #a78bfa; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="tour_confirmed"] .kanban-col-header { border-top: 3px solid #34d399; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="closed_won"] .kanban-col-header { border-top: 3px solid #4ade80; border-radius: 10px 10px 0 0; }
    .kanban-col[data-status="disqualified"] .kanban-col-header { border-top: 3px solid #f87171; border-radius: 10px 10px 0 0; }

    .main.has-topnav { display: flex; flex-direction: column; }

    /* Analytics */
    .analytics { padding: 20px 24px; overflow-y: auto; height: 100%; }
    .analytics h3 {
      font-size: 12px; color: #6366f1; text-transform: uppercase;
      letter-spacing: 0.5px; font-weight: 700;
      margin-top: 24px; margin-bottom: 12px;
    }
    .analytics h3:first-child { margin-top: 0; }
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: #141414; border: 1px solid #2a2a2a;
      padding: 16px; border-radius: 10px;
    }
    .stat-card .label {
      font-size: 11px; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stat-card .value {
      font-size: 26px; font-weight: 700; margin-top: 4px; color: #e0e0e0;
    }
    .stat-card .sub {
      font-size: 11px; color: #666; margin-top: 2px;
    }
    .funnel { display: flex; flex-direction: column; gap: 6px; }
    .funnel-row {
      display: flex; align-items: center; gap: 10px;
    }
    .funnel-label {
      width: 140px; font-size: 12px; color: #aaa; flex-shrink: 0;
    }
    .funnel-bar {
      flex: 1; background: #1a1a1a; border-radius: 4px;
      height: 24px; position: relative; overflow: hidden;
    }
    .funnel-fill {
      height: 100%; transition: width 0.3s;
      display: flex; align-items: center; padding: 0 8px;
      font-size: 11px; font-weight: 600; color: white;
    }
    .rate-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
    }
    .rate-card {
      background: #141414; border: 1px solid #2a2a2a;
      padding: 20px; border-radius: 10px; text-align: center;
    }
    .rate-card .label {
      font-size: 11px; color: #888; text-transform: uppercase;
    }
    .rate-card .value {
      font-size: 32px; font-weight: 700; margin: 6px 0;
      color: #6366f1;
    }
    .day-chart {
      display: flex; align-items: flex-end; gap: 4px;
      height: 140px; padding: 10px 0;
      border-bottom: 1px solid #2a2a2a;
    }
    .day-bar {
      flex: 1; background: #6366f1; border-radius: 3px 3px 0 0;
      min-height: 2px; position: relative;
      transition: background 0.15s;
    }
    .day-bar:hover { background: #a5b4fc; }
    .day-labels {
      display: flex; gap: 4px; padding-top: 4px;
    }
    .day-label {
      flex: 1; text-align: center; font-size: 10px; color: #666;
    }
    .analytics-locked {
      padding: 60px; text-align: center; color: #888;
    }
    .analytics-locked h2 { color: #fbbf24; margin-bottom: 8px; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1><span class="logo">OR</span> OVA REAL</h1>
      </div>
      <div class="user-chip">
        <div class="who">
          <strong id="user-name">Cargando...</strong>
          <span id="tenant-name">-</span>
        </div>
        <button onclick="logout()">Salir</button>
      </div>
      <div class="tabs">
        <button class="tab active" data-view="leads" onclick="setView('leads')">Leads</button>
        <button class="tab" data-view="config" onclick="setView('config')">Config</button>
      </div>
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="Buscar por nombre, email, ID..." autocomplete="off" />
        <button class="clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="panel-content" id="sidebar-content">
        <div style="padding:40px; text-align:center; color:#666;">Cargando...</div>
      </div>
    </div>
    <div class="main has-topnav" id="main">
      <div class="top-nav">
        <button class="nav-btn active" data-main-view="inbox" onclick="setMainView('inbox')">📥 Inbox</button>
        <button class="nav-btn" data-main-view="pipeline" onclick="setMainView('pipeline')">📊 Pipeline</button>
        <button class="nav-btn" data-main-view="analytics" onclick="setMainView('analytics')">📈 Analytics</button>
      </div>
      <div id="main-content" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="empty-state">
          <div class="icon-box">CRM</div>
          <p>Selecciona un lead o cambia a Pipeline</p>
        </div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- Modal editar lead -->
  <div class="modal-overlay" id="edit-lead-modal">
    <div class="modal">
      <h2>Editar lead</h2>
      <div class="modal-grid">
        <div><label>Nombre</label><input id="e-name" /></div>
        <div><label>Nombre pareja</label><input id="e-partner" /></div>
        <div><label>Teléfono</label><input id="e-phone" /></div>
        <div><label>Email</label><input id="e-email" type="email" /></div>
        <div><label>Status</label><select id="e-status">
          <option value="new">new</option>
          <option value="contacted">contacted</option>
          <option value="qualified">qualified</option>
          <option value="disqualified">disqualified</option>
          <option value="touring">touring</option>
          <option value="tour_confirmed">tour_confirmed</option>
          <option value="closed_won">closed_won</option>
          <option value="closed_lost">closed_lost</option>
        </select></div>
        <div><label>Score (0-100)</label><input id="e-score" type="number" min="0" max="100" /></div>
        <div><label>Fecha mudanza</label><input id="e-movein" placeholder="June 2026" /></div>
        <div><label>Ocupantes</label><select id="e-occupants">
          <option value="">-</option>
          <option value="solo">solo</option>
          <option value="pareja">pareja</option>
          <option value="familia">familia</option>
        </select></div>
        <div><label>Mascotas</label><select id="e-pets">
          <option value="">-</option>
          <option value="none">none</option>
          <option value="normal">normal</option>
          <option value="ESA">ESA</option>
        </select></div>
        <div><label>Crédito</label><input id="e-credit" type="number" /></div>
        <div><label>Presupuesto máx ($)</label><input id="e-budget" type="number" /></div>
        <div><label>Unidad preferida</label><input id="e-unit" placeholder="2BR/2BA" /></div>
        <div><label>Idioma</label><select id="e-lang">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select></div>

    function renderMainArea() {
      if (currentView !== "leads") return // config se renderiza aparte

    async function renderAnalytics() {
      const mc = document.getElementById("main-content")
      mc.innerHTML = '<div class="analytics"><div style="color:#666; padding:60px; text-align:center;">Calculando métricas...</div></div>'

      const slug = currentTenant?.slug || ""
      const res = await fetch(API + "?action=analytics&tenant=" + encodeURIComponent(slug), {
        headers: { Authorization: "Bearer " + window.token },
      })

      if (res.status === 403) {
        mc.innerHTML =
          '<div class="analytics"><div class="analytics-locked">' +
            '<h2>📈 Analytics</h2>' +
            '<p>Esta feature no está activa en tu plan.</p>' +
            '<p style="margin-top:8px; font-size:13px;">Contactá a OVA VISION para activarla: ovavision.ve@gmail.com</p>' +
          '</div></div>'
        return
      }

      const data = await res.json()
      if (!data.totals) {
        mc.innerHTML = '<div class="analytics"><p style="color:#f87171;">Error cargando analytics.</p></div>'
        return
      }

      const t = data.totals
      const f = data.funnel
      const r = data.rates

      // Speed-to-lead
      let speed = "-"
      if (data.avg_response_seconds !== null) {
        const s = data.avg_response_seconds
        if (s < 60) speed = s + "s"
        else if (s < 3600) speed = Math.round(s / 60) + " min"
        else speed = (s / 3600).toFixed(1) + " h"
      }

      // Funnel bars
      const maxFunnel = Math.max(1, ...Object.values(f))
      const funnelOrder = [
        ["new", "Nuevos", "#60a5fa"],
        ["contacted", "Contactados", "#fbbf24"],
        ["qualified", "Calificados", "#34d399"],
        ["touring", "Tour propuesto", "#a78bfa"],
        ["tour_confirmed", "Tour confirmado", "#34d399"],
        ["closed_won", "Cerrados", "#4ade80"],
        ["disqualified", "Descalificados", "#f87171"],
      ]
      let funnelHTML = '<div class="funnel">'
      for (const [key, label, color] of funnelOrder) {
        const n = f[key] || 0
        const pct = Math.max(3, Math.round(n / maxFunnel * 100))
        funnelHTML += '<div class="funnel-row">' +
          '<div class="funnel-label">' + label + '</div>' +
          '<div class="funnel-bar"><div class="funnel-fill" style="width:' + pct + '%; background:' + color + ';">' + (n > 0 ? n : '') + '</div></div>' +
          '</div>'
      }
      funnelHTML += '</div>'

      // Chart de leads por día
      const days = Object.keys(data.leads_by_day)
      const maxDay = Math.max(1, ...Object.values(data.leads_by_day))
      let barsHTML = '<div class="day-chart">'
      for (const d of days) {
        const n = data.leads_by_day[d]
        const h = Math.max(2, Math.round(n / maxDay * 130))
        barsHTML += '<div class="day-bar" style="height:' + h + 'px" title="' + d + ': ' + n + ' leads"></div>'
      }
      barsHTML += '</div><div class="day-labels">'
      for (const d of days) {
        const label = d.slice(5)
        barsHTML += '<div class="day-label">' + label + '</div>'
      }
      barsHTML += '</div>'

      mc.innerHTML = '<div class="analytics">' +
        '<h3>Resumen</h3>' +
        '<div class="stat-grid">' +
          '<div class="stat-card"><div class="label">Leads hoy</div><div class="value">' + t.leads_today + '</div></div>' +
          '<div class="stat-card"><div class="label">Últimos 7 días</div><div class="value">' + t.leads_week + '</div></div>' +
          '<div class="stat-card"><div class="label">Últimos 30 días</div><div class="value">' + t.leads_month + '</div></div>' +
          '<div class="stat-card"><div class="label">Total leads</div><div class="value">' + t.leads + '</div></div>' +
          '<div class="stat-card"><div class="label">Mensajes total</div><div class="value">' + t.messages + '</div><div class="sub">' + t.inbound + ' in · ' + t.outbound + ' out</div></div>' +
          '<div class="stat-card"><div class="label">Speed-to-lead</div><div class="value">' + speed + '</div><div class="sub">Tiempo promedio 1ra respuesta</div></div>' +
        '</div>' +
        '<h3>Tasas de conversión</h3>' +
        '<div class="rate-grid">' +
          '<div class="rate-card"><div class="label">Calificación</div><div class="value">' + Math.round(r.qualification * 100) + '%</div><div class="sub" style="color:#888; font-size:11px;">leads que califican</div></div>' +
          '<div class="rate-card"><div class="label">Tour agendado</div><div class="value">' + Math.round(r.tour * 100) + '%</div><div class="sub" style="color:#888; font-size:11px;">de calificados</div></div>' +
          '<div class="rate-card"><div class="label">Cierre</div><div class="value">' + Math.round(r.close * 100) + '%</div><div class="sub" style="color:#888; font-size:11px;">de tours</div></div>' +
        '</div>' +
        '<h3>Funnel por status</h3>' +
        funnelHTML +
        '<h3>Leads últimos 14 días</h3>' +
        barsHTML +
        '</div>'
    }

    function renderPipeline() {
      const mc = document.getElementById("main-content")
      // Agrupar leads por status
      const byStatus = {}
      for (const col of STATUS_COLS) byStatus[col.key] = []
      for (const l of leads) {
        const s = l.status || "new"
        if (byStatus[s]) byStatus[s].push(l)
        else byStatus["new"].push(l)
      }
      let html = '<div class="kanban" id="kanban">'
      for (const col of STATUS_COLS) {
        const colLeads = byStatus[col.key] || []
        html += '<div class="kanban-col" data-status="' + col.key + '" ondragover="kanbanDragOver(event)" ondragleave="kanbanDragLeave(event)" ondrop="kanbanDrop(event, \'' + col.key + '\')">'
        html += '<div class="kanban-col-header"><h3>' + col.label + '</h3><span class="col-count">' + colLeads.length + '</span></div>'
        html += '<div class="kanban-cards">'
        for (const l of colLeads) {
          const name = l.name || "Lead " + l.sender_id
          html += '<div class="kanban-card" draggable="true" data-sender-id="' + l.sender_id + '"' +
            ' ondragstart="kanbanDragStart(event, \'' + l.sender_id + '\')"' +
            ' ondragend="kanbanDragEnd(event)"' +
            ' onclick="openLeadFromKanban(\'' + l.sender_id + '\')">' +
            '<div class="card-name">' + esc(name) + '</div>'
          if (l.selected_property_name) html += '<div class="card-property">' + esc(l.selected_property_name) + '</div>'
          html += '<div class="card-meta">'
          html += '<span>' + (l.language || "en") + (l.credit_score ? ' · ' + l.credit_score + ' crédito' : '') + '</span>'
          html += '<span>' + getTimeAgo(l.updated_at || l.created_at) + '</span>'
          html += '</div></div>'
        }
        if (colLeads.length === 0) {
          html += '<div style="padding:20px; text-align:center; color:#555; font-size:12px;">Sin leads</div>'
        }
        html += '</div></div>'
      }
      html += '</div>'
      mc.innerHTML = html
    }

    window.kanbanDragStart = function(ev, senderId) {
      ev.dataTransfer.setData("text/plain", senderId)
      ev.target.classList.add("dragging")
    }
    window.kanbanDragEnd = function(ev) {
      ev.target.classList.remove("dragging")
    }
    window.kanbanDragOver = function(ev) {
      ev.preventDefault()
      ev.currentTarget.classList.add("drag-over")
    }
    window.kanbanDragLeave = function(ev) {
      ev.currentTarget.classList.remove("drag-over")
    }
    window.kanbanDrop = async function(ev, newStatus) {
      ev.preventDefault()
      ev.currentTarget.classList.remove("drag-over")
      const senderId = ev.dataTransfer.getData("text/plain")
      if (!senderId) return
      // Actualizar local inmediatamente (optimista)
      const lead = leads.find(l => l.sender_id === senderId)
      if (!lead || lead.status === newStatus) return
      const oldStatus = lead.status
      lead.status = newStatus
      renderPipeline()
      // Persistir en DB
      const r = await api("?action=bulk-update-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender_ids: [senderId], new_status: newStatus }),
      })
      if (r.ok) {
        toast("Movido a " + newStatus)
      } else {
        lead.status = oldStatus
        renderPipeline()
        toast(r.error || "Error", true)
      }
    }

    window.openLeadFromKanban = function(senderId) {
      selectedLead = senderId
      currentMainView = "inbox"
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.mainView === "inbox"))
      selectLead(senderId)
    }

    window.logout = async function() {
      await supabase.auth.signOut()
      window.location.href = "login.html"
    }

    window.selectLead = selectLead
    window.toggleAI = toggleAI
    window.saveConfig = saveConfig

    async function api(path, init = {}) {
      const res = await fetch(API + path, {
        ...init,
        headers: { ...(init.headers || {}), Authorization: "Bearer " + window.token },
      })
      return res.json()
    }

    async function loadLeads() {
      const data = await api("?tenant=" + (currentTenant?.slug || ""))
      leads = data.leads || []
      renderLeadsList()
      // Si estás en pipeline, re-renderizar para actualizar columnas
      if (currentView === "leads" && currentMainView === "pipeline") renderPipeline()
    }

    function filterLeads() {
      if (!searchTerm) return leads
      const q = searchTerm.toLowerCase()
      return leads.filter(l => {
        return (l.name || "").toLowerCase().includes(q)
          || (l.sender_id || "").toLowerCase().includes(q)
          || (l.email || "").toLowerCase().includes(q)
          || (l.phone || "").toLowerCase().includes(q)
          || (l.instagram_handle || "").toLowerCase().includes(q)
          || (l.partner_name || "").toLowerCase().includes(q)
          || (l.selected_property_name || "").toLowerCase().includes(q)
          || (l.status || "").toLowerCase().includes(q)
      })
    }

    function renderLeadsList() {
      const content = document.getElementById("sidebar-content")
      const filtered = filterLeads()
      const countLabel = searchTerm
        ? 'Leads (' + filtered.length + ' de ' + leads.length + ')'
        : 'Leads (' + leads.length + ')'
      content.innerHTML = '<div class="lead-count">' + countLabel + '</div>'
      if (leads.length === 0) {
        content.innerHTML += '<div style="padding:40px; text-align:center; color:#666; font-size:13px;">Sin leads aún.<br>Cuando alguien te escriba por IG aparece acá.</div>'
        return
      }
      if (filtered.length === 0) {
        content.innerHTML += '<div style="padding:40px; text-align:center; color:#666; font-size:13px;">Sin resultados para "' + esc(searchTerm) + '"</div>'
        return
      }
      content.innerHTML += filtered.map(function(l) {
        const isActive = l.sender_id === selectedLead
        const name = l.name || "Lead " + l.sender_id
        const initial = name.charAt(0).toUpperCase()
        const status = l.status || "new"
        const time = getTimeAgo(l.updated_at || l.created_at)
        return '<div class="lead-item' + (isActive ? ' active' : '') + '" onclick="selectLead(\'' + l.sender_id + '\')">' +
          '<div class="lead-avatar">' + initial + '</div>' +
          '<div class="lead-info">' +
            '<div class="lead-name">' + esc(name) + '</div>' +
            '<div class="lead-meta">' +
              '<span class="status-badge status-' + status + '">' + status + '</span>' +
              '<span class="lead-time">' + time + '</span>' +
            '</div>' +
          '</div>' +
        '</div>'
      }).join("")
    }

    window.clearSearch = function() {
      searchTerm = ""
      const input = document.getElementById("search-input")
      if (input) input.value = ""
      document.getElementById("search-clear").classList.remove("show")
      renderLeadsList()
    }

    // Bindear input de búsqueda (una sola vez)
    document.getElementById("search-input").addEventListener("input", function(e) {
      searchTerm = e.target.value.trim()
      document.getElementById("search-clear").classList.toggle("show", searchTerm.length > 0)
      renderLeadsList()
    })

    async function selectLead(senderId, skipRefresh) {
      selectedLead = senderId
      currentMainView = "inbox"
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.mainView === "inbox"))
      renderLeadsList()
      if (!skipRefresh) {
        document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="icon-box">CRM</div><p>Cargando...</p></div>'
      }
      const data = await api("?tenant=" + (currentTenant?.slug || "") + "&lead=" + senderId)
      const lead = leads.find(l => l.sender_id === senderId)
      renderChat(lead, data.conversacion || [])
    }

    function renderChat(lead, msgs) {
      const main = document.getElementById("main-content")
      if (!lead) return
      const name = lead.name || "Lead " + lead.sender_id
      const aiBadge = lead.ai_active === false
        ? '<button class="ai-badge paused" onclick="toggleAI(\'' + lead.sender_id + '\', true)">Bot pausado - Activar</button>'
        : '<button class="ai-badge" onclick="toggleAI(\'' + lead.sender_id + '\', false)">Bot activo - Pausar</button>'

      let detailHTML = '<div class="lead-detail-bar">'
      detailHTML += '<div class="detail-item"><strong>ID:</strong> ' + esc(lead.sender_id) + '</div>'
      detailHTML += '<div class="detail-item"><strong>Status:</strong> <span class="status-badge status-' + lead.status + '">' + lead.status + '</span></div>'
      detailHTML += '<div class="detail-item"><strong>Idioma:</strong> ' + (lead.language || "en") + '</div>'
      if (lead.credit_score) detailHTML += '<div class="detail-item"><strong>Crédito:</strong> ' + lead.credit_score + '</div>'
      if (lead.pets) detailHTML += '<div class="detail-item"><strong>Mascotas:</strong> ' + lead.pets + '</div>'
      if (lead.occupants) detailHTML += '<div class="detail-item"><strong>Ocupantes:</strong> ' + lead.occupants + '</div>'
      if (lead.selected_property_name) detailHTML += '<div class="detail-item"><strong>Propiedad:</strong> ' + esc(lead.selected_property_name) + '</div>'
      if (lead.tour_date) detailHTML += '<div class="detail-item"><strong>Tour:</strong> ' + esc(lead.tour_date) + '</div>'
      detailHTML += '<div class="detail-item"><strong>Mensajes:</strong> ' + msgs.length + '</div>'
      detailHTML += '</div>'

      const chatHTML = msgs.map(function(m) {
        const dir = m.direction === "inbound" ? "inbound" : "outbound"
        const isAgent = m.direction === "outbound" && m.sent_by === "agent"
        const dirClass = dir + (isAgent ? " agent" : "")
        const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
        const agentTag = isAgent ? '<div class="agent-tag">Enviado por vos</div>' : ''
        return '<div class="message ' + dirClass + '"><div style="max-width:100%;">' +
          '<div class="bubble">' + esc(m.message_text) +
          '<span class="msg-time">' + time + '</span></div>' +
          agentTag + '</div></div>'
      }).join("")

      const composerHTML =
        '<div class="chat-composer">' +
          '<div class="chat-composer-row">' +
            '<textarea class="chat-input" id="msg-input" placeholder="Escribí un mensaje manual al lead..." rows="1"></textarea>' +
            '<button class="chat-send" id="msg-send" onclick="sendManualMessage(\'' + lead.sender_id + '\')">Enviar</button>' +
          '</div>' +
          '<div class="chat-options">' +
            '<label><input type="checkbox" id="msg-pause-bot" ' + (lead.ai_active === false ? '' : 'checked') + '/> Pausar bot después de enviar</label>' +
          '</div>' +
        '</div>'

      main.innerHTML =
        '<div class="main-header">' +
          '<h2>' + esc(name) + '<button class="edit-btn" onclick="openEditModal(\'' + lead.sender_id + '\')">Editar</button></h2>' +
          aiBadge +
        '</div>' +
        detailHTML +
        '<div class="chat-container">' +
          '<div class="chat" id="chat">' + (chatHTML || '<div class="empty-state" style="padding:40px 0;"><p>Sin mensajes aún</p></div>') + '</div>' +
          composerHTML +
        '</div>'

      const chat = document.getElementById("chat")
      if (chat) chat.scrollTop = chat.scrollHeight

      // Enter para enviar, Shift+Enter para nueva línea
      const input = document.getElementById("msg-input")
      if (input) {
        input.addEventListener("keydown", function(e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault()
            window.sendManualMessage(lead.sender_id)
          }
        })
        input.focus()
      }
    }

    window.openEditModal = function(senderId) {
      const lead = leads.find(l => l.sender_id === senderId)
      if (!lead) return
      document.getElementById("e-name").value = lead.name || ""
      document.getElementById("e-partner").value = lead.partner_name || ""
      document.getElementById("e-phone").value = lead.phone || ""
      document.getElementById("e-email").value = lead.email || ""
      document.getElementById("e-status").value = lead.status || "new"
      document.getElementById("e-score").value = lead.score || 0
      document.getElementById("e-movein").value = lead.move_in_date || ""
      document.getElementById("e-occupants").value = lead.occupants || ""
      document.getElementById("e-pets").value = lead.pets || ""
      document.getElementById("e-credit").value = lead.credit_score || ""
      document.getElementById("e-budget").value = lead.budget_max || ""
      document.getElementById("e-unit").value = lead.preferred_unit || ""
      document.getElementById("e-lang").value = lead.language || "en"
      document.getElementById("e-property").value = lead.selected_property_name || ""
      document.getElementById("e-tour-date").value = lead.tour_date || ""
      document.getElementById("e-tour-confirmed").value = lead.tour_confirmed ? "true" : "false"
      document.getElementById("e-notes").value = lead.notes || ""
      document.getElementById("e-tour-notes").value = lead.tour_notes || ""
      document.getElementById("edit-lead-modal").dataset.senderId = senderId
      document.getElementById("edit-lead-modal").classList.add("show")
    }

    window.closeEditModal = function() {
      document.getElementById("edit-lead-modal").classList.remove("show")
    }

    window.saveLeadEdits = async function() {
      const modal = document.getElementById("edit-lead-modal")
      const senderId = modal.dataset.senderId
      if (!senderId) return
      const val = id => document.getElementById(id).value.trim()
      const num = id => {
        const v = val(id); if (v === "") return null; const n = Number(v); return isNaN(n) ? null : n
      }
      const updates = {
        name: val("e-name") || null,
        partner_name: val("e-partner") || null,
        phone: val("e-phone") || null,
        email: val("e-email") || null,
        status: val("e-status"),
        score: num("e-score"),
        move_in_date: val("e-movein") || null,
        occupants: val("e-occupants") || null,
        pets: val("e-pets") || null,
        credit_score: num("e-credit"),
        budget_max: num("e-budget"),
        preferred_unit: val("e-unit") || null,
        language: val("e-lang"),
        selected_property_name: val("e-property") || null,
        tour_date: val("e-tour-date") || null,
        tour_confirmed: val("e-tour-confirmed") === "true",
        notes: val("e-notes") || null,
        tour_notes: val("e-tour-notes") || null,
      }
      const r = await api("?action=update-lead", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender_id: senderId, updates }),
      })
      if (r.ok) {
        toast("Lead actualizado")
        closeEditModal()
        await loadLeads()
        if (selectedLead) selectLead(selectedLead)
      } else {
        toast(r.error || "Error", true)
      }
    }

    window.sendManualMessage = async function(senderId) {
      const input = document.getElementById("msg-input")
      const btn = document.getElementById("msg-send")
      const pauseChk = document.getElementById("msg-pause-bot")
      const texto = (input?.value || "").trim()
      if (!texto) return
      if (btn) { btn.disabled = true; btn.textContent = "Enviando..." }

      const r = await api("?action=send-message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sender_id: senderId,
          texto,
          pause_bot: !!pauseChk?.checked,
        }),
      })

      if (btn) { btn.disabled = false; btn.textContent = "Enviar" }

      if (r.ok) {
        if (input) input.value = ""
        toast("Mensaje enviado")
        // Refrescar la conversación
        await loadLeads()
        if (selectedLead) selectLead(selectedLead)
      } else {
        toast(r.error || "Error enviando mensaje", true)
      }
    }

    async function toggleAI(senderId, newState) {
      const r = await api("?action=toggle-ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sender_id: senderId, ai_active: newState }),
      })
      if (r.ok) {
        toast(newState ? "Bot activado" : "Bot pausado")
        await loadLeads()
        if (selectedLead) selectLead(selectedLead)
      } else toast(r.error || "Error", true)
    }

    async function renderConfig() {
      const content = document.getElementById("sidebar-content")
      content.innerHTML = '<div style="padding:20px; color:#888; font-size:13px;">Mirá los detalles del panel principal →</div>'

      const t = currentTenant || {}
      const f = t.features || {}

      // Pre-cargar agent_voice si la feature está ON
      if (f.custom_bot_voice) {
        try {
          const cfg = await api("?action=agent-config")
          window._agentVoiceValue = cfg.config?.agent_voice || ""
        } catch (e) { window._agentVoiceValue = "" }
      }
      const featureKeys = {
        instagram_bot: "Bot Instagram",
        ai_responses: "Respuestas IA",
        google_sheets_properties: "Propiedades (Sheets)",
        ai_memory_extraction: "Memoria estructurada",
        auto_followups: "Follow-ups automáticos",
        admin_email_notifications: "Email notifications",
        handoff_to_human: "Handoff a humano",
        multi_language: "Multi-idioma",
        dashboard_access: "Acceso al CRM",
        drip_campaigns: "Drip campaigns",
        lead_scoring: "Lead scoring",
        analytics: "Analytics",
      }
      let featuresHtml = ""
      for (const k of Object.keys(featureKeys)) {
        const on = !!f[k]
        featuresHtml += '<div class="feature-badge ' + (on ? "enabled" : "disabled") + '">' +
          featureKeys[k] + '<span>' + (on ? "ON" : "OFF") + '</span></div>'
      }

      document.getElementById("main-content").innerHTML =
        '<div class="config-view">' +
          '<h2>Configuración de ' + esc(t.name || "") + '</h2>' +
          '<h3>Datos del agente</h3>' +
          '<div class="config-row"><label>Nombre</label><input id="c-agent-name" value="' + esc(t.agent_name || "") + '"/></div>' +
          '<div class="config-row"><label>Email</label><input id="c-agent-email" type="email" value="' + esc(t.agent_email || "") + '"/></div>' +
          '<div class="config-row"><label>Teléfono / WhatsApp</label><input id="c-agent-phone" value="' + esc(t.agent_phone || "") + '"/></div>' +
          '<div class="config-row"><label>Idioma preferido</label><select id="c-agent-language">' +
            '<option value="en"' + (t.agent_language === "en" ? " selected" : "") + '>English</option>' +
            '<option value="es"' + (t.agent_language === "es" ? " selected" : "") + '>Español</option>' +
          '</select></div>' +
          '<h3>Bot</h3>' +
          '<div class="config-row"><label>Nombre del bot</label><input id="c-bot-name" value="' + esc(t.bot_name || "") + '"/></div>' +
          '<div class="config-row"><label>Bot activo</label><select id="c-bot-active">' +
            '<option value="true"' + (t.bot_active ? " selected" : "") + '>Sí</option>' +
            '<option value="false"' + (!t.bot_active ? " selected" : "") + '>No</option>' +
          '</select></div>' +
          '<div class="config-row"><label>Google Sheet ID (propiedades)</label><input id="c-sheet-id" value="' + esc(t.google_sheet_id || "") + '"/></div>' +
          '<button class="btn" onclick="saveConfig()">Guardar cambios</button>' +
          (f.custom_bot_voice
            ? '<h3>Voz del bot</h3>' +
              '<div class="config-row"><label>Descripción de la voz/personalidad del bot (se inyecta en el prompt)</label>' +
              '<textarea id="c-agent-voice" rows="4" placeholder="Ej: Luis Almario, real estate agent en Miami con 10 años de experiencia, casual, directo, bilingue">' + esc(window._agentVoiceValue || "") + '</textarea></div>' +
              '<button class="btn" onclick="saveAgentVoice()">Guardar voz</button>'
            : '') +
          '<h3>Features contratados</h3>' +
          '<p style="font-size:13px; color:#888; margin-bottom:12px;">Estos los gestiona OVA VISION. Si necesitas activar algo, avisanos.</p>' +
          '<div class="feature-list">' + featuresHtml + '</div>' +
        '</div>'
    }

    window.saveAgentVoice = async function() {
      const voice = document.getElementById("c-agent-voice").value
      const r = await api("?action=update-agent-config", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug: currentTenant.slug, updates: { agent_voice: voice } }),
      })
      if (r.ok) { window._agentVoiceValue = voice; toast("Voz del bot guardada") }
      else toast(r.error || "Error", true)
    }

    async function saveConfig() {
      const updates = {
        agent_name: document.getElementById("c-agent-name").value,
        agent_email: document.getElementById("c-agent-email").value,
        agent_phone: document.getElementById("c-agent-phone").value,
        agent_language: document.getElementById("c-agent-language").value,
        bot_name: document.getElementById("c-bot-name").value,
        bot_active: document.getElementById("c-bot-active").value === "true",
        google_sheet_id: document.getElementById("c-sheet-id").value,
      }
      const r = await api("?action=update-tenant", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug: currentTenant.slug, updates }),
      })
      if (r.ok) {
        toast("Guardado")
        const me = await api("?action=me")
        currentTenant = me.tenant
      } else toast(r.error || "Error", true)
    }

    function toast(msg, isError) {
      const el = document.getElementById("toast")
      el.textContent = msg
      el.className = "toast show" + (isError ? " error" : "")
      setTimeout(() => el.className = "toast", 2500)
    }

    function esc(s) {
      if (s === null || s === undefined) return ""
      const d = document.createElement("div")
      d.textContent = String(s)
      return d.innerHTML
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return ""
      const diff = Date.now() - new Date(dateStr).getTime()
      const mins = Math.floor(diff / 60000)
      if (mins < 1) return "ahora"
      if (mins < 60) return mins + "m"
      const hours = Math.floor(mins / 60)
      if (hours < 24) return hours + "h"
      return Math.floor(hours / 24) + "d"
    }

    // Auto-refresh
    setInterval(() => { if (currentView === "leads") loadLeads() }, 15000)
  </script>
</body>
</html>
