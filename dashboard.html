<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 320px;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      background: #141414;
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a2a;
    }
    .sidebar-header h1 { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .sidebar-header .logo {
      width: 28px; height: 28px; background: #6366f1; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 12px; color: #fff;
    }
    .tenant-selector {
      padding: 10px 20px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a2a;
      font-size: 12px;
    }
    .tenant-selector select {
      width: 100%;
      padding: 6px 8px;
      background: #0f0f0f;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
      margin-top: 4px;
      font-size: 13px;
    }
    .lead-count {
      padding: 10px 20px;
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2a2a2a;
    }
    .leads-list { flex: 1; overflow-y: auto; }
    .lead-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; cursor: pointer;
      border-bottom: 1px solid #1e1e1e; transition: background 0.15s;
    }
    .lead-item:hover { background: #1e1e1e; }
    .lead-item.active { background: #1e1e3a; border-left: 3px solid #6366f1; }
    .lead-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: #2a2a4a;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 16px; color: #a5b4fc; flex-shrink: 0;
    }
    .lead-info { flex: 1; min-width: 0; }
    .lead-name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .lead-time { font-size: 11px; color: #666; }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; }
    .main-header {
      padding: 14px 24px; border-bottom: 1px solid #2a2a2a; background: #141414;
      display: flex; align-items: center; justify-content: space-between;
    }
    .main-header h2 { font-size: 16px; font-weight: 600; }
    .ai-badge {
      padding: 4px 10px;
      background: #1e3b2f; color: #34d399;
      border-radius: 12px; font-size: 11px; font-weight: 600;
    }
    .ai-badge.paused { background: #3b2f1e; color: #fbbf24; }
    .lead-detail-bar {
      padding: 12px 24px; background: #1a1a2e;
      border-bottom: 1px solid #2a2a2a;
      display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px;
    }
    .detail-item { display: flex; gap: 4px; align-items: center; }

    /* Chat */
    .chat {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .message { display: flex; max-width: 65%; }
    .message.inbound { align-self: flex-start; }
    .message.outbound { align-self: flex-end; }
    .bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 14px; line-height: 1.4;
    }
    .inbound .bubble { background: #2a2a2a; border-bottom-left-radius: 4px; }
    .outbound .bubble {
      background: #3730a3; color: #e0e7ff; border-bottom-right-radius: 4px;
    }
    .msg-time {
      display: block; font-size: 10px; color: #888;
      margin-top: 4px; text-align: right;
    }
    .outbound .msg-time { color: #a5b4fc; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #555;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

    .status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      font-weight: 600; text-transform: uppercase;
    }
    .status-new { background: #1e3a5f; color: #60a5fa; }
    .status-contacted { background: #3b2f1e; color: #fbbf24; }
    .status-qualified { background: #1e3b2f; color: #34d399; }
    .status-disqualified { background: #3b1e1e; color: #f87171; }
    .status-touring { background: #2e1e3b; color: #a78bfa; }
    .status-tour_confirmed { background: #1e3b2f; color: #34d399; }
    .status-closed_won { background: #1e3b1e; color: #4ade80; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .loading { text-align: center; padding: 40px; color: #666; }

    @media (max-width: 768px) {
      .sidebar { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1><span class="logo">OR</span> OVA REAL</h1>
      </div>
      <div class="tenant-selector">
        <span style="color:#888;">Cliente</span>
        <select id="tenant-select" onchange="onTenantChange()">
          <option>Cargando...</option>
        </select>
      </div>
      <div class="lead-count" id="lead-count">Cargando...</div>
      <div class="leads-list" id="leads-list"></div>
    </div>
    <div class="main" id="main">
      <div class="empty-state">
        <div class="icon">OR</div>
        <p>Selecciona un lead para ver la conversacion</p>
      </div>
    </div>
  </div>

  <script>
    const API = "https://vrfydffwczomvuoigwsm.supabase.co/functions/v1/dashboard";
    let selectedLead = null;
    let selectedTenant = null;
    let leadsData = [];
    let tenantsData = [];

    async function fetchTenants() {
      try {
        const res = await fetch(API + "?tenants=1");
        const data = await res.json();
        tenantsData = data.tenants || [];
        const sel = document.getElementById("tenant-select");
        sel.innerHTML = tenantsData.map(t =>
          '<option value="' + t.slug + '">' + esc(t.name) + ' (' + (t.instagram_handle || 'IG') + ')</option>'
        ).join("");
        if (tenantsData.length > 0 && !selectedTenant) {
          selectedTenant = tenantsData[0].slug;
          sel.value = selectedTenant;
          fetchLeads();
        }
      } catch (err) {
        document.getElementById("lead-count").textContent = "Error de conexion";
      }
    }

    function onTenantChange() {
      selectedTenant = document.getElementById("tenant-select").value;
      selectedLead = null;
      document.getElementById("main").innerHTML = '<div class="empty-state"><div class="icon">OR</div><p>Selecciona un lead</p></div>';
      fetchLeads();
    }

    async function fetchLeads() {
      try {
        const url = API + (selectedTenant ? "?tenant=" + selectedTenant : "");
        const res = await fetch(url);
        const data = await res.json();
        leadsData = data.leads || [];
        renderLeads();
      } catch (err) {
        document.getElementById("lead-count").textContent = "Error";
      }
    }

    async function selectLead(senderId) {
      selectedLead = senderId;
      renderLeads();
      document.getElementById("main").innerHTML = '<div class="loading">Cargando conversacion...</div>';
      try {
        const res = await fetch(API + "?tenant=" + selectedTenant + "&lead=" + senderId);
        const data = await res.json();
        const lead = leadsData.find(l => l.sender_id === senderId);
        renderChat(lead, data.conversacion || []);
      } catch (err) {
        document.getElementById("main").innerHTML = '<div class="loading">Error</div>';
      }
    }

    function renderLeads() {
      document.getElementById("lead-count").textContent = "Leads (" + leadsData.length + ")";
      const list = document.getElementById("leads-list");
      if (leadsData.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:40px;"><p>Sin leads aun</p></div>';
        return;
      }
      list.innerHTML = leadsData.map(function(lead) {
        const isActive = lead.sender_id === selectedLead;
        const name = lead.name || "Lead " + lead.sender_id;
        const initial = name.charAt(0).toUpperCase();
        const status = lead.status || "new";
        const time = getTimeAgo(lead.updated_at || lead.created_at);
        return '<div class="lead-item' + (isActive ? ' active' : '') + '" onclick="selectLead(\'' + lead.sender_id + '\')">' +
          '<div class="lead-avatar">' + initial + '</div>' +
          '<div class="lead-info">' +
            '<div class="lead-name">' + esc(name) + '</div>' +
            '<div class="lead-meta">' +
              '<span class="status-badge status-' + status + '">' + status + '</span>' +
              '<span class="lead-time">' + time + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join("");
    }

    function renderChat(lead, msgs) {
      const main = document.getElementById("main");
      const name = lead ? (lead.name || "Lead " + lead.sender_id) : "Lead";

      let detailHTML = "";
      if (lead) {
        const aiBadge = lead.ai_active === false
          ? '<span class="ai-badge paused">Bot pausado</span>'
          : '<span class="ai-badge">Bot activo</span>';
        detailHTML = '<div class="lead-detail-bar">';
        detailHTML += '<div class="detail-item"><strong>ID:</strong> ' + esc(lead.sender_id) + '</div>';
        detailHTML += '<div class="detail-item"><strong>Status:</strong> <span class="status-badge status-' + lead.status + '">' + lead.status + '</span></div>';
        detailHTML += '<div class="detail-item"><strong>Idioma:</strong> ' + (lead.language || "en") + '</div>';
        if (lead.credit_score) detailHTML += '<div class="detail-item"><strong>Credito:</strong> ' + lead.credit_score + '</div>';
        if (lead.pets) detailHTML += '<div class="detail-item"><strong>Mascotas:</strong> ' + lead.pets + '</div>';
        if (lead.occupants) detailHTML += '<div class="detail-item"><strong>Ocupantes:</strong> ' + lead.occupants + '</div>';
        if (lead.selected_property_name) detailHTML += '<div class="detail-item"><strong>Propiedad:</strong> ' + esc(lead.selected_property_name) + '</div>';
        if (lead.tour_date) detailHTML += '<div class="detail-item"><strong>Tour:</strong> ' + esc(lead.tour_date) + '</div>';
        detailHTML += '<div class="detail-item"><strong>Mensajes:</strong> ' + msgs.length + '</div>';
        detailHTML += '</div>';

        main.innerHTML =
          '<div class="main-header"><h2>' + esc(name) + '</h2>' + aiBadge + '</div>' +
          detailHTML +
          '<div class="chat" id="chat">' + msgs.map(renderMessage).join("") + '</div>';
      } else {
        main.innerHTML =
          '<div class="main-header"><h2>' + esc(name) + '</h2></div>' +
          '<div class="chat" id="chat">' + msgs.map(renderMessage).join("") + '</div>';
      }

      const chat = document.getElementById("chat");
      if (chat) chat.scrollTop = chat.scrollHeight;
    }

    function renderMessage(msg) {
      const dir = msg.direction === "inbound" ? "inbound" : "outbound";
      const time = new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      return '<div class="message ' + dir + '">' +
        '<div class="bubble">' + esc(msg.message_text) +
          '<span class="msg-time">' + time + '</span>' +
        '</div></div>';
    }

    function esc(s) {
      if (s === null || s === undefined) return "";
      var d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    function getTimeAgo(dateStr) {
      if (!dateStr) return "";
      var diff = Date.now() - new Date(dateStr).getTime();
      var mins = Math.floor(diff / 60000);
      if (mins < 1) return "ahora";
      if (mins < 60) return mins + "m";
      var hours = Math.floor(mins / 60);
      if (hours < 24) return hours + "h";
      return Math.floor(hours / 24) + "d";
    }

    fetchTenants();
    setInterval(() => { if (selectedTenant) fetchLeads(); }, 15000);
  </script>
</body>
</html>
