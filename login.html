<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVA REAL - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: #141414;
      padding: 40px;
      border-radius: 16px;
      border: 1px solid #2a2a2a;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo {
      width: 56px; height: 56px; background: #6366f1;
      border-radius: 14px; display: inline-flex;
      align-items: center; justify-content: center;
      font-weight: 700; font-size: 22px; color: white;
      margin-bottom: 12px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 14px; }
    label {
      display: block; font-size: 13px; color: #aaa;
      margin-bottom: 6px; margin-top: 16px;
    }
    input {
      width: 100%; padding: 12px 14px; background: #0f0f0f;
      color: #e0e0e0; border: 1px solid #333; border-radius: 8px;
      font-size: 14px; transition: border 0.2s;
    }
    input:focus { outline: none; border-color: #6366f1; }
    .btn {
      width: 100%; padding: 12px; background: #6366f1;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 24px; transition: background 0.2s;
    }
    .btn:hover { background: #5558d9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #3b1e1e; color: #f87171;
      padding: 12px; border-radius: 8px;
      font-size: 13px; margin-top: 16px;
      display: none;
    }
    .error.show { display: block; }
    .footer {
      text-align: center; margin-top: 24px;
      color: #666; font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-header">
      <div class="logo">OR</div>
      <h1>OVA REAL</h1>
      <p class="subtitle">CRM para agentes inmobiliarios</p>
    </div>
    <form onsubmit="return login(event)">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="tu@email.com" required autofocus />
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" required />
      <button class="btn" id="btn-login" type="submit">Entrar</button>
      <div class="error" id="error"></div>
    </form>
    <p class="footer">OVA VISION Agency &middot; 2026</p>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

    const SUPABASE_URL = "https://vrfydffwczomvuoigwsm.supabase.co"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyZnlkZmZ3Y3pvbXZ1b2lnd3NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODI1ODIsImV4cCI6MjA5MTg1ODU4Mn0.An0aAhj_tKnRZ6tR-ESq5yJGbmzZ2CchdAH9bBUc38I"

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    window.supabase = supabase

    // Si ya hay sesión, redirigir automáticamente
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      await redirectByRole(session.access_token)
    }

    window.login = async function(e) {
      e.preventDefault()
      const btn = document.getElementById("btn-login")
      const err = document.getElementById("error")
      err.classList.remove("show")
      btn.disabled = true
      btn.textContent = "Entrando..."

      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error || !data.session) {
        err.textContent = error?.message || "Credenciales inválidas"
        err.classList.add("show")
        btn.disabled = false
        btn.textContent = "Entrar"
        return
      }

      await redirectByRole(data.session.access_token)
    }

    async function redirectByRole(token) {
      const res = await fetch(SUPABASE_URL + "/functions/v1/dashboard?action=me", {
        headers: { Authorization: "Bearer " + token }
      })
      const data = await res.json()

      if (data.user?.role === "super_admin") {
        window.location.href = "admin.html"
        return
      }

      // Feature flag: dashboard_access — si está OFF, bloquear entrada
      const features = data.tenant?.features || {}
      if (features.dashboard_access === false) {
        await supabase.auth.signOut()
        const err = document.getElementById("error")
        err.innerHTML = "Tu plan actual no incluye acceso al dashboard CRM.<br>Contactá a OVA VISION para activarlo: ovavision.ve@gmail.com"
        err.classList.add("show")
        const btn = document.getElementById("btn-login")
        btn.disabled = false
        btn.textContent = "Entrar"
        return
      }

      window.location.href = "dashboard.html"
    }
  </script>
</body>
</html>
