# El webhook debe ser público (Meta no envía Authorization header)
[functions.webhook]
verify_jwt = false

# Dashboard público (proteger con auth propia más adelante)
[functions.dashboard]
verify_jwt = false

# Cron de follow-ups (disparado por pg_cron cada hora)
[functions.followup-cron]
verify_jwt = false

# Bootstrap one-shot (protegido con token interno)
[functions.bootstrap]
verify_jwt = false

# Campaign runner (disparado por pg_cron cada hora)
[functions.campaign-runner]
verify_jwt = false

# SMS webhook (Twilio no manda Authorization)
[functions.sms-webhook]
verify_jwt = false

# Tour reminders (disparado por pg_cron cada 30min)
[functions.tour-reminders]
verify_jwt = false

# Stripe checkout - signup publico, sin auth
[functions.stripe-checkout]
verify_jwt = false

# Stripe webhook - recibe llamadas de Stripe, sin auth
[functions.stripe-webhook]
verify_jwt = false

# Stripe portal - requiere JWT de Supabase (el endpoint verifica manualmente)
[functions.stripe-portal]
verify_jwt = false
